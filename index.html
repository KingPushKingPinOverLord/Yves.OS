<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yves.OS - Editorial</title>
    
    <!-- Editorial Typography -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=Epilogue:wght@500;700;900&family=IBM+Plex+Mono:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Midnight Taro & Sand - Unique Dark Pastel Palette */
            --os-bg: #1a181d;          /* Deep plum-slate */
            --panel-bg: #232027;       /* Slightly elevated panel */
            --os-accent: #e0d2b4;      /* Pastel Sand / Gold */
            --os-accent-alt: #98a69e;  /* Muted Sage */
            --os-accent-hot: #c99a9a;  /* Dusty Lilac/Pink */
            
            /* Harsh, Editorial Borders */
            --panel-border: 2px solid #48434d;
            --border-light: 1px solid #36323b;
            --panel-shadow: 6px 6px 0px rgba(10, 9, 12, 0.6);
            
            --text-primary: #e8e5e1;
            --text-secondary: #9c969e;
            --text-inverse: #1a181d;

            /* Aura Colors (Muted) */
            --blob-1-color: #e0d2b4; 
            --blob-2-color: #98a69e; 
            --blob-3-color: #c99a9a; 
            --blob-4-color: #8a96a3; 
            --blob-5-color: #b5a4b8; 

            /* Typography */
            --font-head: 'Epilogue', sans-serif;
            --font-body: 'DM Sans', sans-serif;
            --font-mono: 'IBM Plex Mono', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-drag: none; }

        ::selection { background: var(--os-accent); color: var(--text-inverse); }

        body, html {
            width: 100%; height: 100%; overflow: hidden;
            font-family: var(--font-body); color: var(--text-primary);
            background-color: var(--os-bg);
            -webkit-font-smoothing: antialiased;
        }

        /* Blocky Scrollbar */
        ::-webkit-scrollbar { width: 12px; height: 12px; }
        ::-webkit-scrollbar-track { background: var(--panel-bg); border-left: var(--panel-border); }
        ::-webkit-scrollbar-thumb { background: var(--text-secondary); }
        ::-webkit-scrollbar-thumb:hover { background: var(--os-accent); }

        /* Background Engine */
        .bg-container { position: absolute; inset: 0; z-index: 0; overflow: hidden; background: var(--os-bg); }
        
        #blob-canvas { 
            position: absolute; inset: 0; z-index: 0; 
            transition: opacity 0.3s ease;
        }

        .dot-matrix {
            position: absolute; inset: 0; z-index: 1; pointer-events: none;
            background-image: radial-gradient(rgba(255, 255, 255, 0.06) 1px, transparent 1px);
            background-size: 24px 24px;
        }

        /* ASCII Background Container */
        #bg-ascii-container {
            position: absolute; inset: 0; z-index: 1; display: none;
            justify-content: center; align-items: center;
            font-family: var(--font-mono); white-space: pre; line-height: 1.1; overflow: hidden;
            opacity: 0; transition: opacity 0.5s ease, color 0.3s ease;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.5);
            font-size: min(0.7vw, 1.2vh); 
            pointer-events: none;
            color: var(--os-accent);
        }

        /* Top Bar - Editorial Marquee Style */
        .top-bar {
            height: 36px; width: 100%; position: absolute; top: 0; left: 0;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 16px; z-index: 9999;
            background: var(--os-bg); border-bottom: var(--panel-border);
            font-family: var(--font-mono); font-size: 12px; font-weight: 600; text-transform: uppercase;
        }

        .top-bar-left, .top-bar-right { display: flex; align-items: center; gap: 20px; }

        .marquee-container {
            flex: 1; overflow: hidden; white-space: nowrap; margin: 0 24px;
            color: var(--text-secondary); opacity: 0.7; font-size: 11px; letter-spacing: 1px;
        }
        .marquee-content { display: inline-block; animation: marquee 20s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .menu-item { cursor: pointer; display: flex; align-items: center; gap: 8px; transition: color 0.15s ease; letter-spacing: 0.5px;}
        .menu-item:hover { color: var(--os-accent); }

        /* Giant Editorial Clock */
        .desktop-bg-widget { position: absolute; z-index: 2; pointer-events: none; transition: all 0.5s ease; }
        .desktop-bg-widget.pos-top-left { top: 12%; left: 6%; transform: none; text-align: left; }
        
        .nothing-clock { 
            font-family: var(--font-head); font-size: clamp(80px, 12vw, 180px); line-height: 0.85; 
            color: var(--text-primary); letter-spacing: -4px; font-weight: 900;
        }
        .nothing-date { 
            font-family: var(--font-mono); font-size: 14px; letter-spacing: 2px; color: var(--os-bg); 
            margin-top: 16px; text-transform: uppercase; font-weight: 600; background: var(--os-accent); 
            display: inline-block; padding: 6px 12px;
        }

        /* Spotlight Search */
        #spotlight-overlay {
            display: none; position: fixed; inset: 0; background: rgba(26, 24, 29, 0.9);
            z-index: 10000; align-items: center; justify-content: center;
        }
        .spotlight-box {
            width: 640px; max-width: 90%; background: var(--panel-bg); border: 2px solid var(--text-primary);
            box-shadow: var(--panel-shadow); display: flex; flex-direction: column;
            animation: slideDown 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes slideDown { 0% { transform: translateY(-20px); opacity: 0;} 100% { transform: translateY(0); opacity: 1;} }
        
        .spotlight-label {
            font-family: var(--font-mono); font-size: 11px; padding: 8px 16px; 
            background: var(--text-primary); color: var(--os-bg); text-transform: uppercase; font-weight: 600;
        }
        #spotlight-input {
            width: 100%; padding: 24px; font-size: 24px; font-family: var(--font-head); font-weight: 700;
            background: transparent; border: none; color: var(--text-primary); outline: none; caret-color: var(--os-accent);
        }
        #spotlight-input::placeholder { color: var(--text-secondary); opacity: 0.5; font-weight: 500;}

        /* Blocky Text Dock */
        .dock-container {
            position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 0px; z-index: 9999;
            background: var(--panel-bg); border: var(--panel-border); box-shadow: var(--panel-shadow);
        }
        .dock-item {
            padding: 12px 20px; cursor: pointer; transition: all 0.1s ease;
            font-family: var(--font-head); font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
            color: var(--text-secondary); border-right: var(--panel-border);
            display: flex; align-items: center; gap: 8px;
        }
        .dock-item:last-child { border-right: none; }
        .dock-item:hover { background: var(--text-primary); color: var(--os-bg); }
        .dock-item.active { color: var(--os-accent); }
        .dock-item:hover.active { color: var(--os-bg); }

        /* Window & Window State Management */
        .window {
            position: absolute; display: flex; flex-direction: column;
            overflow: hidden; min-width: 400px; min-height: 250px; z-index: 100;
            background: var(--panel-bg); border: var(--panel-border); box-shadow: var(--panel-shadow);
            transition: opacity 0.2s, transform 0.2s, top 0.2s, left 0.2s, width 0.2s, height 0.2s;
        }
        .window.dragging { transition: none !important; }
        
        .window.focused {
            border-color: var(--text-primary);
            z-index: 1000 !important;
        }

        /* Editorial Window Header */
        .window-header {
            height: 44px; display: flex; align-items: stretch; justify-content: space-between;
            cursor: move; border-bottom: var(--panel-border); background: var(--os-bg);
            transition: background 0.2s;
        }
        .window.focused .window-header { background: var(--panel-bg); }
        
        .window-title { 
            font-family: var(--font-head); font-size: 14px; font-weight: 700; text-transform: uppercase; 
            letter-spacing: 1px; padding: 0 16px; display: flex; align-items: center; color: var(--text-primary);
            border-right: var(--panel-border);
        }
        .window-title-meta {
            font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary); 
            display: flex; align-items: center; padding: 0 16px; flex: 1; text-transform: uppercase;
        }

        .editorial-controls { display: flex; }
        .ed-btn {
            width: 44px; background: transparent; border-left: var(--panel-border); color: var(--text-secondary);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-family: var(--font-mono); font-size: 14px; font-weight: 600; transition: all 0.1s;
        }
        .ed-btn:hover { background: var(--text-primary); color: var(--os-bg); }
        .ed-btn.close:hover { background: var(--os-accent); color: var(--os-bg); }
        
        .window-content { flex: 1; position: relative; overflow: auto; display: flex; flex-direction: column; background: var(--os-bg); }

        /* Universal Flat Button */
        .app-btn { 
            background: transparent; color: var(--text-primary); border: var(--panel-border); 
            padding: 10px 24px; cursor: pointer; font-family: var(--font-head); font-weight: 700; font-size: 13px; 
            text-transform: uppercase; letter-spacing: 1px; transition: all 0.1s;
        }
        .app-btn:hover { background: var(--text-primary); color: var(--os-bg); }

        /* Sticky Notes - Annotation Style */
        .sticky-note {
            position: absolute; width: 280px; min-height: 200px; background: var(--os-accent); 
            border: 2px solid var(--text-inverse); box-shadow: 4px 4px 0px var(--text-inverse); 
            z-index: 50; display: flex; flex-direction: column; color: var(--text-inverse); 
            animation: slideDown 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .sticky-header { 
            height: 32px; border-bottom: 2px solid var(--text-inverse); cursor: move; 
            display: flex; justify-content: space-between; align-items: center; padding: 0 12px;
            font-family: var(--font-mono); font-size: 11px; font-weight: 600; text-transform: uppercase;
        }
        .sticky-close { cursor: pointer; font-size: 14px; }
        .sticky-content { flex: 1; padding: 16px; outline: none; font-size: 15px; font-family: var(--font-body); line-height: 1.5; overflow-y: auto;}

        /* --- App Specific Styles --- */
        
        /* About Me - Artist Profile */
        .me-app { padding: 48px; display: flex; flex-direction: column; gap: 32px; height: 100%; max-width: 800px; margin: 0 auto; }
        .me-meta-tag { font-family: var(--font-mono); font-size: 12px; color: var(--os-accent); text-transform: uppercase; letter-spacing: 1px; border: 1px solid var(--os-accent); padding: 4px 8px; width: max-content;}
        .me-details h1 { font-family: var(--font-head); font-size: 56px; color: var(--text-primary); line-height: 1; letter-spacing: -2px; margin-bottom: 16px; text-transform: uppercase;}
        .me-details p { font-size: 18px; color: var(--text-secondary); line-height: 1.6; max-width: 600px;}
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-top: 24px; padding-top: 24px; border-top: var(--border-light); }
        .stat-box { display: flex; flex-direction: column; gap: 8px; }
        .stat-val { font-family: var(--font-mono); font-size: 24px; color: var(--text-primary); }
        .stat-lbl { font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary); text-transform: uppercase; }

        /* Dashboard - Command Center */
        .dash-app { padding: 48px; display: flex; flex-direction: column; gap: 40px; height: 100%; max-width: 900px; margin: 0 auto; width: 100%;}
        .dash-header h1 { font-family: var(--font-head); font-size: 48px; color: var(--text-primary); letter-spacing: -1px; text-transform: uppercase;}
        .dash-focus-box { background: var(--panel-bg); border: var(--panel-border); padding: 32px; position: relative;}
        .dash-focus-tag { position: absolute; top: -10px; left: 24px; background: var(--os-accent); color: var(--os-bg); font-family: var(--font-mono); font-size: 11px; padding: 2px 8px; font-weight: 600; text-transform: uppercase;}
        .dash-input { width: 100%; background: transparent; border: none; color: var(--text-primary); font-size: 32px; font-family: var(--font-head); font-weight: 700; outline: none; margin-top: 8px;}
        .dash-input::placeholder { color: #48434d; }

        /* Terminal App */
        .terminal-app { padding: 32px; font-family: var(--font-mono); font-size: 14px; color: var(--text-primary); height: 100%; overflow-y: auto; background: var(--os-bg); }
        .term-line { margin-bottom: 8px; line-height: 1.6; white-space: pre-wrap; word-break: break-all;}
        .term-prompt { color: var(--os-accent); margin-right: 12px; }
        
        /* Focus Timer App */
        .focus-app { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 24px; background: var(--os-bg);}
        .timer-tag { font-family: var(--font-mono); color: var(--os-accent-hot); font-size: 14px; text-transform: uppercase; letter-spacing: 4px; margin-bottom: 24px;}
        .timer-display { font-family: var(--font-head); font-weight: 900; font-size: clamp(80px, 15vw, 160px); color: var(--text-primary); line-height: 1; margin-bottom: 48px; letter-spacing: -4px; }
        
        /* Workspace App - Lyrics/Annotation Style */
        .notion-app { display: flex; height: 100%; background: var(--os-bg); }
        .notion-sidebar { width: 260px; border-right: var(--panel-border); display: flex; flex-direction: column; background: var(--panel-bg);}
        .notion-sidebar-header { padding: 20px; font-family: var(--font-head); font-weight: 700; font-size: 14px; color: var(--text-primary); display: flex; justify-content: space-between; align-items: center; text-transform: uppercase; border-bottom: var(--border-light); }
        .notion-add-btn { cursor: pointer; font-size: 18px; line-height: 1; }
        .notion-add-btn:hover { color: var(--os-accent); }
        .notion-page-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
        .notion-page-item { padding: 16px 20px; cursor: pointer; font-family: var(--font-body); font-weight: 500; font-size: 14px; color: var(--text-secondary); transition: all 0.1s; border-bottom: var(--border-light); display: flex; justify-content: space-between; align-items: center;}
        .notion-page-item:hover { background: rgba(255,255,255,0.03); color: var(--text-primary);}
        .notion-page-item.active { background: var(--text-primary); color: var(--os-bg); border-left: 4px solid var(--os-accent); }
        
        .notion-main { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 48px; max-width: 800px; margin: 0 auto; width: 100%; }
        .notion-meta { font-family: var(--font-mono); font-size: 12px; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 16px; letter-spacing: 1px; display: flex; gap: 16px;}
        .notion-title-input { font-size: 48px; font-weight: 900; background: transparent; border: none; color: var(--text-primary); outline: none; font-family: var(--font-head); margin-bottom: 40px; letter-spacing: -1px; text-transform: uppercase;}
        .notion-title-input::placeholder { color: #48434d; }
        
        .notion-editor { flex: 1; outline: none; font-family: var(--font-body); font-size: 18px; line-height: 1.8; color: var(--text-primary); font-weight: 400;}
        .notion-editor:empty:before { content: "Begin transmission..."; color: #48434d; pointer-events: none; }
        .notion-editor h1 { font-family: var(--font-head); font-size: 32px; color: var(--text-primary); margin: 40px 0 16px 0; line-height: 1.2; text-transform: uppercase; letter-spacing: -1px;}
        .notion-editor h2 { font-family: var(--font-head); font-size: 24px; color: var(--os-accent); margin: 32px 0 12px 0; line-height: 1.3;}
        .notion-editor ul { padding-left: 24px; margin-bottom: 24px; }

        /* Project Tracker App */
        .tracker-app { padding: 48px; max-width: 900px; margin: 0 auto; width: 100%; height: 100%; overflow-y: auto; }
        .tracker-header { margin-bottom: 48px; display: flex; flex-direction: column; gap: 8px;}
        .tracker-header h3 { font-family: var(--font-head); font-size: 40px; color: var(--text-primary); letter-spacing: -1px; text-transform: uppercase;}
        .tracker-header p { font-family: var(--font-mono); color: var(--text-secondary); font-size: 13px; text-transform: uppercase; letter-spacing: 1px;}
        
        .proj-card { background: transparent; border: var(--panel-border); padding: 32px; margin-bottom: 32px; position: relative;}
        .proj-tag { position: absolute; top: -12px; left: 24px; background: var(--text-primary); color: var(--os-bg); font-family: var(--font-mono); font-size: 11px; padding: 4px 12px; font-weight: 600; text-transform: uppercase;}
        .proj-title { font-family: var(--font-head); font-size: 24px; font-weight: 700; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; text-transform: uppercase;}
        .proj-progress { width: 100%; height: 4px; background: var(--panel-bg); margin-bottom: 24px;}
        .proj-progress-bar { height: 100%; background: var(--os-accent); transition: width 0.3s ease; }
        
        .task-item { display: flex; align-items: flex-start; gap: 16px; padding: 16px 0; border-top: var(--border-light); cursor: pointer; font-size: 16px; font-family: var(--font-body);}
        .task-item .checkbox { width: 20px; height: 20px; border: 2px solid var(--text-secondary); display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px;}
        .task-item.done .checkbox { background: var(--text-primary); border-color: var(--text-primary); }
        .task-item.done .checkbox::after { content: '×'; color: var(--os-bg); font-weight: bold; font-size: 14px; font-family: var(--font-mono);}
        .task-item.done span { color: var(--text-secondary); text-decoration: line-through;}

        .app-input-row { display: flex; gap: 16px; margin-top: 24px; }
        .app-input { flex: 1; background: transparent; border: var(--panel-border); padding: 12px 16px; color: var(--text-primary); font-family: var(--font-body); outline: none; font-size: 15px;}
        .app-input:focus { border-color: var(--os-accent); }
        
        /* Settings App */
        .settings-app { padding: 48px; max-width: 800px; margin: 0 auto; width: 100%; height: 100%; overflow-y: auto; }
        .settings-section { margin-bottom: 48px; }
        .settings-section h2 { font-family: var(--font-head); font-size: 24px; text-transform: uppercase; color: var(--text-primary); margin-bottom: 24px; letter-spacing: -0.5px;}
        .settings-row { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-top: var(--border-light); font-size: 15px; font-family: var(--font-mono); text-transform: uppercase;}
        
        .settings-color { -webkit-appearance: none; border: none; width: 40px; height: 40px; cursor: pointer; background: transparent; padding: 0;}
        .settings-color::-webkit-color-swatch-wrapper { padding: 0; }
        .settings-color::-webkit-color-swatch { border: var(--panel-border); border-radius: 0; }

        /* Flappy Game */
        .flappy-app { position: relative; width: 100%; height: 100%; overflow: hidden; outline: none; user-select: none; background: var(--os-bg);}
        .flappy-bird { position: absolute; width: 24px; height: 24px; background: var(--os-accent); left: 80px; top: 150px; transition: transform 0.1s linear; z-index: 5;}
        .flappy-pipe { position: absolute; width: 60px; background: var(--text-primary); z-index: 4; }
        .flappy-score { position: absolute; top: 32px; width: 100%; text-align: center; font-size: 80px; font-family: var(--font-head); font-weight: 900; color: var(--text-inverse); z-index: 10; text-shadow: -2px -2px 0 var(--text-primary), 2px -2px 0 var(--text-primary), -2px 2px 0 var(--text-primary), 2px 2px 0 var(--text-primary); pointer-events: none;}
        .flappy-msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: var(--font-head); color: var(--os-bg); font-size: 24px; font-weight: 900; text-transform: uppercase; text-align: center; background: var(--text-primary); padding: 32px 48px; cursor: pointer; z-index: 10; letter-spacing: -1px;}
    </style>
</head>
<body>

    <!-- Spotlight Search Overlay -->
    <div id="spotlight-overlay">
        <div class="spotlight-box">
            <div class="spotlight-label">Command Palette</div>
            <input type="text" id="spotlight-input" placeholder="Search or execute..." autocomplete="off">
        </div>
    </div>

    <!-- Background Engine -->
    <div class="bg-container" id="bg-container">
        <canvas id="blob-canvas"></canvas>
        <div class="dot-matrix"></div>
        <div id="bg-ascii-container"></div>
    </div>

    <!-- Editorial Top Bar -->
    <div class="top-bar">
        <div class="top-bar-left">
            <div class="menu-item" onclick="openApp('dashboard')">
                <span style="background: var(--text-primary); color: var(--os-bg); padding: 2px 6px;">Y.OS</span>
                <span>SYSTEM CORE</span>
            </div>
        </div>
        <div class="marquee-container">
            <div class="marquee-content">
                // SYSTEM ONLINE // ALL NODES RESPONDING // AURA PHYSICS ACTIVE // ENJOY THE SILENCE // 
                SYSTEM ONLINE // ALL NODES RESPONDING // AURA PHYSICS ACTIVE // ENJOY THE SILENCE //
            </div>
        </div>
        <div class="top-bar-right">
            <div class="menu-item" style="color: var(--os-accent);" title="Cmd+K to search" onclick="toggleSpotlight()">[ CMD+K ]</div>
            <div class="menu-item" id="sys-clock-small">--:--</div>
        </div>
    </div>

    <!-- Desktop Clock Widget -->
    <div class="desktop-bg-widget pos-top-left" id="desktop-bg-widget">
        <div class="nothing-clock" id="bg-clock">--<span style="opacity:0.2;">:</span>--</div>
        <div class="nothing-date" id="bg-date">DAY, MTH 00</div>
    </div>

    <!-- Window Layer -->
    <div id="window-layer"></div>

    <!-- Blocky Dock -->
    <div class="dock-container">
        <div class="dock-item" onclick="openApp('me')" id="dock-me">Identity</div>
        <div class="dock-item" onclick="openApp('dashboard')" id="dock-dashboard">Dash</div>
        <div class="dock-item" onclick="openApp('workspace')" id="dock-workspace">Drafts</div>
        <div class="dock-item" onclick="openApp('projects')" id="dock-projects">Tasks</div>
        <div class="dock-item" onclick="openApp('focus')" id="dock-focus">Timer</div>
        <div class="dock-item" onclick="openApp('terminal')" id="dock-terminal">Term</div>
        <div class="dock-item" onclick="openApp('flappy')" id="dock-flappy">Break</div>
        <div class="dock-item" onclick="openApp('settings')" id="dock-settings">Config</div>
    </div>

    <script>
        let zIndex = 100;
        const openWindows = {};
        window.flappyLoopId = null;

        // Mouse tracking for alive canvas
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;
        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        // Spotlight Search (CMD+K)
        function toggleSpotlight() {
            const spot = document.getElementById('spotlight-overlay');
            const inp = document.getElementById('spotlight-input');
            if (spot.style.display === 'none' || spot.style.display === '') {

                    vx: (Math.random() - 0.5) * 1.5,

        function makeDraggable(winEl, handleEl) {
            let startX = 0, startY = 0, currentX = 0, currentY = 0;
            handleEl.onpointerdown = (e) => {
                if (winEl.classList.contains('maximized')) return; 
                e.preventDefault(); focusWindow(winEl.id.replace('win-', ''));
                startX = e.clientX; startY = e.clientY;
                
                winEl.classList.add('dragging');

                document.onpointermove = (ev) => {
                    ev.preventDefault(); 
                    currentX = startX - ev.clientX; currentY = startY - ev.clientY;
                    startX = ev.clientX; startY = ev.clientY;
                    
                    let newTop = winEl.offsetTop - currentY, newLeft = winEl.offsetLeft - currentX;
                    if (newTop < 36) newTop = 36; // Prevent dragging behind top bar
                    
                    winEl.style.top = newTop + "px"; winEl.style.left = newLeft + "px";

                    // Kinetic skew effect based on velocity
                    let skewX = Math.min(Math.max(currentX * -0.3, -3), 3);
                    winEl.style.transform = `scale(1) skewX(${skewX}deg)`;
                };
                document.onpointerup = () => { 
                    winEl.classList.remove('dragging');

                    document.onpointermove = null;

        };

        function setAsciiBackground(type) {
            const container = document.getElementById('bg-ascii-container');
            const blobCanvas = document.getElementById('blob-canvas');
            let content = asciiArtDB[type];
            let color = "#e0d2b4";
            
            if (type === 'david' || type === 'edgerunners') color = "var(--ascii-color, #e0d2b4)";
            else if (type === 'lucy') color = "#8fa094";
            else if (type === 'moon') color = "#d5d8de";
            else if (type === 'house') color = "#e0d2b4";
            else if (type === 'redjohn') color = "var(--os-accent-hot)";
            else if (type && type.startsWith('kanye')) color = "#c99a9a";

            if (content) {
                if(blobCanvas) blobCanvas.style.display = 'none';
                container.innerHTML = content;
                container.style.color = color;
                container.style.display = 'flex';
                void container.offsetWidth;
                container.style.opacity = 1;
                document.documentElement.style.setProperty('--os-accent', color.startsWith('var') ? '#e0d2b4' : color);
            } else {
                container.style.opacity = 0;
                setTimeout(() => {
                    container.style.display = 'none';
                    if(blobCanvas) blobCanvas.style.display = 'block';
                    document.documentElement.style.setProperty('--os-accent', getComputedStyle(document.documentElement).getPropertyValue('--blob-1-color').trim());
                }, 500);
            }
        }

        window.changeClockPos = function(posClass) {
            document.getElementById('desktop-bg-widget').className = 'desktop-bg-widget ' + posClass;
        }

        window.toggleBg = function() {
            window.isBgEnabled = !window.isBgEnabled;
        }

        // --- Pomodoro Management Engine ---
        window.togglePomo = function() {
            if (pomoIsRunning) {
                clearInterval(pomoInterval);
                document.getElementById('pomo-start-btn').innerText = 'Start Session';
                document.getElementById('pomo-start-btn').classList.remove('active');
            } else {
                document.getElementById('pomo-start-btn').classList.add('active');
                pomoInterval = setInterval(() => {
                    if (pomoSeconds === 0) {
                        if (pomoMinutes === 0) {
                            pomoMode = pomoMode === 'Work' ? 'Break' : 'Work';
                            pomoMinutes = pomoMode === 'Work' ? 25 : 5;
                        } else {
                            pomoMinutes--; pomoSeconds = 59;
                        }
                    } else {
                        pomoSeconds--;
                    }
                    displayPomo();
                }, 1000);
                document.getElementById('pomo-start-btn').innerText = 'Pause Session';
            }
            pomoIsRunning = !pomoIsRunning;
        }

        window.resetPomo = function(mins = 25) {
            clearInterval(pomoInterval);
            pomoIsRunning = false;
            pomoMode = mins === 25 ? 'Work' : 'Break';
            pomoMinutes = mins; pomoSeconds = 0;
            const startBtn = document.getElementById('pomo-start-btn');
            if(startBtn) { startBtn.innerText = 'Start Session'; startBtn.classList.remove('active'); }
            displayPomo();
        }

        window.pausePomo = function() {
            if (pomoIsRunning) window.togglePomo();
        }

        function displayPomo() {
            const timeEl = document.getElementById('pomo-display');
            if (timeEl) {
                timeEl.innerText = `${String(pomoMinutes).padStart(2,'0')}:${String(pomoSeconds).padStart(2,'0')}`;
            }
        }

        function handleCommand(cmdRaw) {
            if (!cmdRaw) return;
            const cmd = cmdRaw.toLowerCase().trim();
            const args = cmd.split(' ');
            const action = args[0];
            const target = args[1];

            termHistory.push(`<span class="term-prompt">SYS_EXEC:~</span> ${cmdRaw}`);
            let output = "";

            if (cmd === 'david' || cmd === 'edgerunners') {
                setAsciiBackground('david'); output = "Loaded workspace context: Sandevistan Calibration.";
            } else if (cmd === 'lucy') {
                setAsciiBackground('lucy'); output = "Loaded workspace context: Lucy Deep-Dive Log.";
            } else if (cmd === 'moon') {
                setAsciiBackground('moon'); output = "Loaded workspace context: Lunar Core Vector.";
            } else if (cmd === 'house' || cmd === 'diagnose') {
                setAsciiBackground('house'); output = "Loaded medical layout: House M.D. Core Vector Grid.";
            } else if (cmd === 'redjohn' || cmd === 'mentalist') {
                setAsciiBackground('redjohn'); output = "Warning: Bloody smiley context override established.";
            } else if (action === 'kanye' && target === 'graduation') {
                setAsciiBackground('kanyegraduation'); output = "Background Layer: Dropout Bear Vector Blueprint.";
            } else if (action === 'kanye' && target === '808s') {
                setAsciiBackground('kanye808s'); output = "Background Layer: Heart Balloon Matrix Node.";
            } else if (action === 'kanye' && target === 'yeezus') {
                setAsciiBackground('kanyeyeezus'); output = "Background Layer: High-Contrast Tape Array Asset.";
            } else if (cmd === 'resetbg') {
                setAsciiBackground(null); output = "Environment arrays completely localized back to dynamic canvas blobs.";
            } else if (action === 'open') {
                if (appRegistry[target]) { openApp(target); output = `Launching context container: ${target}`; }
                else output = `Context framework validation error: ${target}`;
            } else if (cmd === 'help') {
                output = "Commands: open [app], close [app], clear, resetbg\nArt vectors: david, lucy, moon, house, redjohn, kanye graduation, kanye 808s, kanye yeezus";
            } else if (cmd === 'clear') {
                termHistory = ["Yves.OS Terminal [Version 4.0.0]"]; output = null;
            } else {
                output = `Syntax compilation mismatch tokens near: "${cmdRaw}"`;
            }

            if (output) termHistory.push(output);
            renderTerminal();
        }

        function renderTerminal() {
            const termArea = document.getElementById('term-content');
            if (termArea) {
                termArea.innerHTML = termHistory.map(line => `<div class="term-line">${line}</div>`).join('');
                termArea.scrollTop = termArea.scrollHeight;
            }
        }

        // --- Workspace (Notion Style Document Editor Engine) ---
        window.renderNotion = function() {
            const container = document.getElementById('notion-content');
            if (!container) return;
            
            let sidebarHtml = `<div class="notion-sidebar"><div class="notion-sidebar-header"><span>Workspace // Data</span><span class="notion-add-btn" onclick="addNotionPage()">+</span></div><div class="notion-page-list">`;
            notionData.forEach(page => {
                sidebarHtml += `<div class="notion-page-item ${page.id === activeNotionPageId ? 'active' : ''}" onclick="selectNotionPage(${page.id})"><span>${page.title || 'Untitled'}</span><span>${page.icon}</span></div>`;
            });
            sidebarHtml += `</div></div>`;
            
            const activePage = notionData.find(p => p.id === activeNotionPageId) || notionData[0];
            const mainHtml = `
                <div class="notion-main">
                    <div class="notion-meta">
                        <span>PAGE_ID: ${activePage.id}</span>
                        <span>STATUS: ACTIVE</span>
                    </div>
                    <div class="notion-content-wrapper">
                        <input type="text" class="notion-title-input" value="${activePage.title}" placeholder="Untitled" oninput="updateNotionTitle(${activePage.id}, this.value)">
                        <div class="notion-toolbar">
                            <button class="notion-tool-btn" onclick="formatNotion('formatBlock', 'H1')">H1</button>
                            <button class="notion-tool-btn" onclick="formatNotion('formatBlock', 'H2')">H2</button>
                            <button class="notion-tool-btn" onclick="formatNotion('bold')">B</button>
                            <button class="notion-tool-btn" onclick="formatNotion('italic')">I</button>
                            <button class="notion-tool-btn" onclick="formatNotion('insertUnorderedList')">LIST</button>
                        </div>
                        <div class="notion-editor" contenteditable="true" oninput="updateNotionContent(${activePage.id}, this.innerHTML)">${activePage.content}</div>
                    </div>
                </div>
            `;
            container.innerHTML = sidebarHtml + mainHtml;
        }

        window.addNotionPage = function() {
            const newId = Date.now();
            notionData.push({ id: newId, title: "Untitled", icon: "XX", content: "" });
            activeNotionPageId = newId;
            renderNotion();
        }
        window.selectNotionPage = function(id) { activeNotionPageId = id; renderNotion(); }
        window.updateNotionTitle = function(id, title) {
            const page = notionData.find(p => p.id === id);
            if (page) { page.title = title; renderNotion(); }
        }
        window.updateNotionContent = function(id, content) {
            const page = notionData.find(p => p.id === id);
            if (page) page.content = content;
        }
        window.formatNotion = function(command, value = null) {
            document.execCommand(command, false, value);
        }

        // --- Core Task Management Architecture ---
        window.renderProjects = function() {
            const area = document.getElementById('projects-content');
            if (!area) return;
            let html = `<div class="tracker-header"><h3>Active Trackers</h3><p>Log your execution states.</p></div>
                        <div class="app-input-row"><input type="text" id="new-proj-input" class="app-input" placeholder="New objective tracker..."><button class="app-btn" onclick="addProject()">Add Tracker</button></div>`;
            projectsData.forEach(p => {
                const total = p.tasks.length, done = p.tasks.filter(t => t.done).length, pct = total === 0 ? 0 : (done/total)*100;
                const ratioText = done + "/" + total + " Complete";
                html += `
                <div class="proj-card">
                    <div class="proj-tag">TRACKER // ${p.id.toString().slice(-4)}</div>
                    <div class="proj-title"><span>${p.name}</span><span style="font-size:12px;color:var(--text-secondary);font-family:var(--font-mono);">${ratioText}</span></div>
                    <div class="proj-progress"><div class="proj-progress-bar" style="width: ${pct}%"></div></div>
                    <div class="task-list">
                `;
                p.tasks.forEach((t, i) => {
                    html += `
                    <div class="task-item ${t.done ? 'done' : ''}" onclick="toggleTask(${p.id}, ${i})">
                        <div class="checkbox"></div>
                        <span style="flex:1;">${t.t}</span>
                        <span class="delete-task-btn" onclick="deleteTask(${p.id}, ${i}, event)" style="color: var(--text-secondary); cursor: pointer; font-size: 14px; padding: 0 4px; transition: color 0.2s;" onmouseover="this.style.color='var(--os-accent-hot)'" onmouseout="this.style.color='var(--text-secondary)'">✕</span>
                    </div>`;
                });
                html += `
                        <div class="app-input-row" style="margin-top:16px;">
                            <input type="text" id="new-task-${p.id}" class="app-input" style="padding:10px 16px;font-size:14px;" placeholder="Add next sequence...">
                            <button class="app-btn" style="padding:10px 24px;" onclick="addTask(${p.id}, event)">Add</button>
                        </div>
                    </div></div>`;
            });
            area.innerHTML = html;
        }

        window.addProject = function() {
            const inp = document.getElementById('new-proj-input');
            if(inp && inp.value.trim()) { projectsData.push({ id: Date.now(), name: inp.value.trim(), tasks: [] }); renderProjects(); }
        }
        window.addTask = function(pid, e) {
            e.stopPropagation();
            const inp = document.getElementById(`new-task-${pid}`);
            if(inp && inp.value.trim()) {
                const proj = projectsData.find(p => p.id === pid);
                if(proj) { proj.tasks.push({ t: inp.value.trim(), done: false }); renderProjects(); }
            }
        }
        window.toggleTask = function(pid, tIndex) {
            const proj = projectsData.find(p => p.id === pid);
            if(proj && proj.tasks[tIndex]) { proj.tasks[tIndex].done = !proj.tasks[tIndex].done; renderProjects(); }
        }
        window.deleteTask = function(pid, tIndex, event) {
            event.stopPropagation();
            const proj = projectsData.find(p => p.id === pid);
            if (proj && proj.tasks[tIndex]) {
                proj.tasks.splice(tIndex, 1);
                renderProjects();
            }
        }

        // --- Arcade Engine Core (Flappy Glass) ---
        window.startFlappyGame = function() {
            const container = document.getElementById('flappy-container');
            if (!container) return;
            const bird = document.getElementById('flappy-bird'), pipesContainer = document.getElementById('flappy-pipes');
            const scoreEl = document.getElementById('flappy-score'), msgEl = document.getElementById('flappy-msg');
            let isPlaying = false, isGameOver = false, birdY = container.offsetHeight / 2 || 150;
            let velocity = 0, gravity = 0.4, jumpForce = -6, pipes = [], score = 0, frameCount = 0;

            if(window.flappyLoopId) cancelAnimationFrame(window.flappyLoopId);

            const resetGame = () => {
                birdY = container.offsetHeight / 2 || 150; velocity = 0; pipes = []; score = 0;
                pipesContainer.innerHTML = ''; scoreEl.innerText = score;
                bird.style.top = birdY + 'px'; msgEl.style.display = 'none';
                isPlaying = true; isGameOver = false; frameCount = 0; gameLoop();
            };

            const jump = () => { if (isGameOver || !isPlaying) resetGame(); else velocity = jumpForce; };
            container.onclick = jump;
            container.onkeydown = (e) => { if (e.code === 'Space') { e.preventDefault(); jump(); } };
            container.focus();

            const gameOver = () => { isPlaying = false; isGameOver = true; cancelAnimationFrame(window.flappyLoopId); msgEl.style.display = 'block'; };

            const createPipe = () => {
                const gap = 160, minHeight = 40, maxPos = container.offsetHeight - minHeight - gap;
                const topHeight = Math.floor(Math.random() * (maxPos - minHeight + 1) + minHeight);
                const pipeTop = document.createElement('div');
                pipeTop.className = 'flappy-pipe'; pipeTop.style.height = topHeight + 'px'; pipeTop.style.top = '0'; pipeTop.style.left = container.offsetWidth + 'px';
                const pipeBottom = document.createElement('div');
                pipeBottom.className = 'flappy-pipe'; pipeBottom.style.height = (container.offsetHeight - topHeight - gap) + 'px'; pipeBottom.style.bottom = '0'; pipeBottom.style.left = container.offsetWidth + 'px';
                pipesContainer.appendChild(pipeTop); pipesContainer.appendChild(pipeBottom);
                pipes.push({ x: container.offsetWidth, top: pipeTop, bottom: pipeBottom, passed: false });
            };

            const gameLoop = () => {
                if (!isPlaying) return;
                velocity += gravity; birdY += velocity; bird.style.top = birdY + 'px';
                if (birdY < 0 || birdY > container.offsetHeight - 24) { gameOver(); return; }
                if (frameCount % 120 === 0) createPipe();
                for (let i = 0; i < pipes.length; i++) {
                    let p = pipes[i]; p.x -= 3; p.top.style.left = p.x + 'px'; p.bottom.style.left = p.x + 'px';
                    const birdRect = { top: birdY, bottom: birdY + 24, left: 80, right: 104 };
                    const topRect = { top: 0, bottom: parseFloat(p.top.style.height), left: p.x, right: p.x + 60 };
                    const botRect = { top: container.offsetHeight - parseFloat(p.bottom.style.height), bottom: container.offsetHeight, left: p.x, right: p.x + 60 };
                    if ((birdRect.right > topRect.left && birdRect.left < topRect.right && birdRect.top < topRect.bottom) ||
                        (birdRect.right > botRect.left && birdRect.left < botRect.right && birdRect.bottom > botRect.top)) { gameOver(); return; }
                    if (p.x + 60 < 80 && !p.passed) { p.passed = true; score++; scoreEl.innerText = score; }
                }
                if (pipes.length > 0 && pipes[0].x < -60) { pipes[0].top.remove(); pipes[0].bottom.remove(); pipes.shift(); }
                frameCount++; window.flappyLoopId = requestAnimationFrame(gameLoop);
            };
        }

        window.updateCSS = (varName, value) => {
            document.documentElement.style.setProperty(varName, value);
            if (varName.includes('--blob-')) { initAuras(); }
            if (varName === '--blob-1-color' && document.getElementById('bg-ascii-container').style.display !== 'flex') {
                setOSAccent(value);
            }
        };

        function updateClock() {
            const now = new Date();
            const days = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
            const fullDays = ['SUNDAY', 'MONDAY', 'TUESDAY', 'WEDNESDAY', 'THURSDAY', 'FRIDAY', 'SATURDAY'];
            const months = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];
            let h = now.getHours();
            const m = String(now.getMinutes()).padStart(2, '0');
            const ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12;
            
            document.getElementById('sys-clock-small').textContent = `${days[now.getDay()]} ${now.getDate()} ${months[now.getMonth()]} ${h}:${m} ${ampm}`;
            document.getElementById('bg-clock').innerHTML = `${String(h).padStart(2,'0')}<span style="opacity: ${now.getSeconds() % 2 === 0 ? 1 : 0.2}">:</span>${m}`;
            document.getElementById('bg-date').textContent = `${fullDays[now.getDay()]}, ${months[now.getMonth()]} ${String(now.getDate()).padStart(2,'0')}`;
            
            const dashHeader = document.querySelector('.dash-header h1');
            if(dashHeader) {
                let currentH = now.getHours();
                if(currentH < 12) dashHeader.textContent = "Good Morning.";
                else if(currentH < 18) dashHeader.textContent = "Good Afternoon.";
                else dashHeader.textContent = "Good Evening.";
            }
        }

        window.onload = () => {
            setOSAccent(getComputedStyle(document.documentElement).getPropertyValue('--blob-1-color').trim());
            updateClock();
            setInterval(updateClock, 1000);
            
            // Auto open the dashboard to show off the aesthetic immediately
            openApp('dashboard'); 
            const cli = document.getElementById('spotlight-input');
            if(cli) cli.focus();
        };
    </script>
</body>
</html>
