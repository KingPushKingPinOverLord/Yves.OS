<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yves.OS - Dark Pastel</title>
    
    <!-- High-end Brutalist Typography -->
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Unique Dark Pastel Palette: Twilight Matcha & Abyssal Pearl */
            --os-bg: #1a1b20;       /* Deep warm slate */
            --panel-bg: #22242b;    /* Slightly lighter slate for panels */
            --os-accent: #e5a494;   /* Soft dusty peach/coral */
            
            /* Hard edges, softer contrast */
            --panel-border: 2px solid #3d424d;
            --panel-shadow: 8px 8px 0px #0b0c0f; /* Deep charcoal, not pure black */
            
            --text-primary: #d5d8de;
            --text-secondary: #7e8696;
            
            /* Softened macOS controls */
            --mac-red: #d97d7d;
            --mac-yellow: #d9b87d;
            --mac-green: #8abf88;
            
            /* Aura Physics Colors - Dusty Pastels */
            --blob-1-color: #e5a494; /* Peach */
            --blob-2-color: #8c9fb3; /* Slate Blue */
            --blob-3-color: #aa94b8; /* Mauve */
            --blob-4-color: #9ab396; /* Sage */
            --blob-5-color: #c499a2; /* Dusty Rose */
            --ascii-color: #d9b87d;

            --font-ui: 'Space Grotesk', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-drag: none; }

        body, html {
            width: 100%; height: 100%; overflow: hidden;
            font-family: var(--font-ui); color: var(--text-primary);
            background-color: var(--os-bg);
        }

        /* Custom Sharp Scrollbar */
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: var(--panel-bg); border-left: 2px solid var(--panel-border); }
        ::-webkit-scrollbar-thumb { background: var(--text-secondary); border: 2px solid var(--panel-bg); }
        ::-webkit-scrollbar-thumb:hover { background: var(--os-accent); }

        .bg-container {
            position: absolute; inset: 0; z-index: 0; overflow: hidden;
            background: var(--os-bg);
        }

        #blob-canvas { 
            position: absolute; inset: 0; z-index: 0; 
            transition: opacity 0.4s ease;
        }

        .grid-overlay {
            position: absolute; inset: 0;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 1; pointer-events: none;
        }

        #bg-ascii-container {
            position: absolute; inset: 0; z-index: 1; display: none;
            justify-content: center; align-items: center;
            font-family: var(--font-mono); white-space: pre; line-height: 1.1; overflow: hidden;
            opacity: 0; transition: opacity 0.5s ease, color 0.3s ease;
            text-shadow: 4px 4px 0px #0b0c0f;
            font-size: min(0.7vw, 1.2vh); 
            pointer-events: none;
        }

        /* Core Brutalist Panel Design */
        .brutal-panel {
            background: var(--panel-bg);
            border: var(--panel-border);
            box-shadow: var(--panel-shadow);
            border-radius: 0px;
        }

        .top-bar {
            height: 44px; width: 100%; position: absolute; top: 0; left: 0;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; z-index: 9999; font-size: 13px; font-weight: 700;
            background: var(--os-bg); border-bottom: var(--panel-border);
            font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 4px 0 rgba(11,12,15,0.5);
        }

        .top-bar-left, .top-bar-right { display: flex; align-items: center; gap: 24px; }

        .menu-item {
            cursor: pointer; display: flex; align-items: center; gap: 10px;
            transition: color 0.1s ease;
        }
        .menu-item:hover { color: var(--os-accent); }
        .menu-icon-svg { width: 18px; height: 18px; fill: none; stroke: var(--os-accent); stroke-width: 2.5; stroke-linecap: square; }
        
        .desktop-bg-widget { position: absolute; z-index: 2; pointer-events: none; transition: all 0.5s ease; }
        .desktop-bg-widget.pos-center { top: 45%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
        .desktop-bg-widget.pos-top-left { top: 12%; left: 5%; transform: none; text-align: left; }
        .desktop-bg-widget.pos-top-right { top: 12%; left: auto; right: 5%; transform: none; text-align: right; }

        .nothing-clock { font-family: var(--font-mono); font-size: clamp(60px, 8vw, 120px); line-height: 1; color: var(--text-primary); letter-spacing: -4px; text-shadow: 6px 6px 0px var(--panel-bg); font-weight: 800; }
        .nothing-clock span { color: var(--os-accent); transition: color 0.3s ease;}
        .nothing-date { font-family: var(--font-mono); font-size: 15px; letter-spacing: 2px; color: var(--os-bg); margin-top: 16px; text-transform: uppercase; font-weight: 800; background: var(--os-accent); display: inline-block; padding: 6px 12px; border: 2px solid var(--os-bg); box-shadow: 4px 4px 0px var(--panel-bg);}

        /* Spotlight Search */
        #spotlight-overlay {
            display: none; position: fixed; inset: 0; background: rgba(26, 27, 32, 0.85);
            z-index: 10000; align-items: center; justify-content: center; backdrop-filter: blur(8px);
        }
        .spotlight-box {
            width: 600px; max-width: 90%; background: var(--panel-bg); border: 2px solid var(--os-accent);
            box-shadow: var(--panel-shadow); display: flex; flex-direction: column; padding: 8px;
            animation: popIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn { 0% { transform: scale(0.95); opacity: 0;} 100% { transform: scale(1); opacity: 1;} }
        #spotlight-input {
            width: 100%; padding: 20px; font-size: 20px; font-family: var(--font-mono); font-weight: 700;
            background: transparent; border: none; color: var(--text-primary); outline: none; caret-color: var(--os-accent);
        }
        #spotlight-input::placeholder { color: var(--text-secondary); }

        .dock-container {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            padding: 12px 16px; display: flex; align-items: center; gap: 16px; z-index: 9999;
        }
        .dock-item { width: 54px; height: 54px; cursor: pointer; transition: transform 0.1s ease; position: relative; }
        .dock-item:hover { transform: translateY(-4px); z-index: 2; }
        
        .dock-icon-wrapper {
            width: 100%; height: 100%; background: var(--os-bg);
            display: flex; align-items: center; justify-content: center;
            border: 2px solid var(--text-secondary); border-radius: 0;
            transition: all 0.1s ease;
        }
        .dock-item:hover .dock-icon-wrapper { border-color: var(--os-accent); background: var(--os-accent); box-shadow: 4px 4px 0px var(--panel-bg); }
        .dock-icon-wrapper svg { width: 24px; height: 24px; fill: none; stroke: var(--text-primary); stroke-width: 2.5; stroke-linecap: square; transition: all 0.1s ease; }
        .dock-item:hover .dock-icon-wrapper svg { stroke: var(--os-bg); }

        .dock-indicator { width: 6px; height: 6px; background: var(--os-accent); border: 1px solid var(--os-bg); position: absolute; bottom: -12px; left: 50%; transform: translateX(-50%); display: none; }
        .dock-item.active .dock-indicator { display: block; }

        .window {
            position: absolute; display: flex; flex-direction: column;
            overflow: hidden; min-width: 320px; min-height: 200px; z-index: 100;
            transition: opacity 0.2s, transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), top 0.25s, left 0.25s, width 0.25s, height 0.25s;
            transform-origin: center center;
        }
        .window.dragging { transition: none !important; }
        .window.maximized { border: none !important; box-shadow: none !important; }
        
        .window.focused {
            border-color: var(--os-accent);
            z-index: 1000 !important;
            box-shadow: 12px 12px 0px var(--panel-bg);
        }

        .window-header {
            height: 40px; display: flex; align-items: center; justify-content: center;
            padding: 0 16px; cursor: move; border-bottom: 2px solid var(--text-secondary); position: relative; background: var(--os-bg);
            transition: background 0.2s, border-color 0.2s;
        }
        .window.focused .window-header { background: var(--os-accent); border-bottom-color: var(--os-bg);}
        .window.focused .window-content { border-top-color: var(--os-accent); }

        .mac-controls { position: absolute; left: 16px; display: flex; gap: 8px; }
        .mac-btn {
            width: 14px; height: 14px; border: 2px solid var(--text-secondary); background: transparent;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: transform 0.1s ease, border-color 0.2s;
        }
        .window.focused .mac-btn { border-color: var(--os-bg); }
        .mac-btn:hover { transform: scale(1.1); background: var(--os-bg); border-color: var(--os-bg) !important; }
        
        .window-title { font-family: var(--font-mono); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; pointer-events: none; display: flex; align-items: center; gap: 8px; color: var(--text-primary);}
        .window.focused .window-title { color: var(--os-bg); }
        .window-title svg { width: 14px; height: 14px; stroke: var(--text-primary); }
        .window.focused .window-title svg { stroke: var(--os-bg); }
        
        .window-content { flex: 1; position: relative; overflow: auto; display: flex; flex-direction: column; background: var(--panel-bg); }

        /* Universal App Button */
        .app-btn { background: var(--text-primary); color: var(--os-bg); border: 2px solid var(--os-bg); padding: 10px 20px; cursor: pointer; font-family: var(--font-mono); font-weight: 800; font-size: 13px; text-transform: uppercase; transition: all 0.1s; box-shadow: 4px 4px 0 var(--os-accent);}
        .app-btn:hover { background: var(--os-accent); box-shadow: 2px 2px 0 var(--os-bg); transform: translate(2px, 2px); }
        .app-btn:active { box-shadow: 0 0 0 var(--os-bg); transform: translate(4px, 4px); }

        /* Sticky Notes */
        .sticky-note {
            position: absolute; width: 240px; min-height: 240px; background: var(--panel-bg); border: 2px solid var(--os-bg);
            box-shadow: 8px 8px 0px var(--os-accent); z-index: 50; display: flex; flex-direction: column;
            color: var(--text-primary); font-family: var(--font-mono);
            animation: popIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .sticky-header { height: 28px; background: var(--os-accent); cursor: move; border-bottom: 2px solid var(--os-bg); display: flex; justify-content: flex-end; padding: 0 8px; align-items: center;}
        .sticky-close { cursor: pointer; font-weight: bold; font-size: 16px; color: var(--os-bg); transition: transform 0.1s;}
        .sticky-close:hover { transform: scale(1.2); }
        .sticky-content { flex: 1; padding: 16px; outline: none; font-size: 14px; line-height: 1.6; overflow-y: auto; font-weight: 500;}

        h1, h2, h3 { font-family: var(--font-ui); font-weight: 700; text-transform: uppercase;}

        /* About Me App */
        .me-app { padding: 40px; display: flex; gap: 32px; height: 100%; align-items: flex-start; }
        .me-avatar { width: 120px; height: 120px; background: var(--os-bg); border: 2px solid var(--os-accent); display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 6px 6px 0px var(--os-accent); }
        .me-avatar svg { width: 64px; height: 64px; stroke: var(--text-primary); }
        .me-details { display: flex; flex-direction: column; gap: 16px; }
        .me-details h1 { font-size: 42px; color: var(--text-primary); line-height: 1; letter-spacing: -1px;}
        .me-details h3 { font-family: var(--font-mono); font-size: 14px; color: var(--os-accent); letter-spacing: 2px; }
        .me-details p { font-size: 15px; color: var(--text-secondary); line-height: 1.6; font-family: var(--font-mono);}

        /* Dashboard App */
        .dash-app { padding: 40px; display: flex; flex-direction: column; gap: 32px; height: 100%; }
        .dash-header h1 { font-size: 36px; color: var(--text-primary); letter-spacing: -1px;}
        .dash-header p { font-size: 15px; color: var(--text-secondary); font-family: var(--font-mono); margin-top: 8px;}
        .dash-focus-box { background: var(--os-bg); border: 2px solid var(--text-secondary); padding: 24px; border-left: 6px solid var(--os-accent); box-shadow: 6px 6px 0px var(--panel-shadow);}
        .dash-focus-box h3 { font-size: 13px; color: var(--text-secondary); margin-bottom: 16px; font-family: var(--font-mono); }
        .dash-input { width: 100%; background: transparent; border: none; border-bottom: 2px solid var(--panel-border); color: var(--text-primary); font-size: 24px; padding: 8px 0; outline: none; transition: border-color 0.1s ease; font-family: var(--font-ui); font-weight: 600;}
        .dash-input:focus { border-color: var(--os-accent); }
        
        /* Terminal App */
        .terminal-app { padding: 24px; font-family: var(--font-mono); font-size: 14px; color: var(--text-primary); height: 100%; overflow-y: auto; background: var(--os-bg); }
        .term-line { margin-bottom: 8px; line-height: 1.5; white-space: pre-wrap; word-break: break-all;}
        .term-prompt { color: var(--os-accent); margin-right: 8px; font-weight: bold; }
        .ascii-art { white-space: pre; font-family: var(--font-mono); line-height: 1.2; margin: 12px 0; font-size: 12px; letter-spacing: 2px; text-shadow: 2px 2px 0px var(--panel-bg); }
        
        /* Focus Timer App */
        .focus-app { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 20px; background: repeating-linear-gradient(45deg, var(--panel-bg), var(--panel-bg) 10px, var(--os-bg) 10px, var(--os-bg) 20px);}
        .timer-display { font-family: var(--font-mono); font-weight: 800; font-size: 100px; color: var(--text-primary); line-height: 1; margin-bottom: 40px; letter-spacing: -4px; text-shadow: 6px 6px 0px var(--os-accent); }
        .timer-controls { display: flex; gap: 20px; }
        
        /* Workspace App */
        .notion-app { display: flex; height: 100%; color: var(--text-primary); background: var(--panel-bg); }
        .notion-sidebar { width: 220px; background: var(--os-bg); border-right: 2px solid var(--text-secondary); display: flex; flex-direction: column; padding-top: 24px;}
        .notion-sidebar-header { padding: 0 20px 20px 20px; font-family: var(--font-mono); font-weight: 700; font-size: 12px; color: var(--text-secondary); display: flex; justify-content: space-between; align-items: center; text-transform: uppercase; }
        .notion-add-btn { cursor: pointer; font-size: 20px; line-height: 1; transition: color 0.1s; }
        .notion-add-btn:hover { color: var(--os-accent); }
        .notion-page-list { flex: 1; overflow-y: auto; padding: 0 12px; }
        .notion-page-item { padding: 12px; cursor: pointer; display: flex; align-items: center; gap: 12px; font-family: var(--font-ui); font-weight: 600; font-size: 14px; color: var(--text-secondary); transition: all 0.1s; margin-bottom: 8px; border: 2px solid transparent;}
        .notion-page-item:hover { border-color: var(--panel-border); color: var(--text-primary);}
        .notion-page-item.active { background: var(--text-primary); color: var(--os-bg); border-color: var(--text-primary); box-shadow: 4px 4px 0px var(--os-accent);}
        
        .notion-main { flex: 1; display: flex; flex-direction: column; overflow-y: auto; position: relative; }
        .notion-cover { height: 100px; background: repeating-linear-gradient(45deg, var(--os-bg), var(--os-bg) 10px, var(--panel-bg) 10px, var(--panel-bg) 20px); border-bottom: 4px solid var(--os-accent);}
        .notion-icon-picker { font-size: 40px; position: absolute; bottom: -20px; left: 40px; cursor: pointer; background: var(--text-primary); border: 2px solid var(--os-bg); width: 64px; height: 64px; display: flex; align-items: center; justify-content: center; box-shadow: 4px 4px 0 var(--os-accent);}
        .notion-content-wrapper { padding: 60px 40px 40px 40px; flex: 1; display: flex; flex-direction: column; max-width: 800px; margin: 0 auto; width: 100%;}
        .notion-title-input { font-size: 42px; font-weight: 800; background: transparent; border: none; color: var(--text-primary); outline: none; font-family: var(--font-ui); margin-bottom: 32px; letter-spacing: -1px; text-transform: uppercase;}
        .notion-title-input::placeholder { color: var(--text-secondary); }
        
        .notion-toolbar { display: flex; gap: 8px; margin-bottom: 32px; position: sticky; top: 0; background: var(--panel-bg); padding: 12px 0; z-index: 10; border-bottom: 2px solid var(--text-secondary); }
        .notion-tool-btn { background: var(--os-bg); border: 2px solid var(--text-secondary); color: var(--text-primary); padding: 8px 12px; cursor: pointer; font-family: var(--font-mono); font-size: 13px; font-weight: 700; transition: all 0.1s; text-transform: uppercase;}
        .notion-tool-btn:hover { background: var(--os-accent); border-color: var(--os-accent); color: var(--os-bg); box-shadow: 2px 2px 0 var(--os-bg);}
        
        .notion-editor { flex: 1; outline: none; font-family: var(--font-ui); font-size: 16px; line-height: 1.7; color: var(--text-primary); font-weight: 400;}
        .notion-editor:empty:before { content: "Initialize data entry..."; color: var(--text-secondary); pointer-events: none; font-family: var(--font-mono); }
        .notion-editor h1 { font-size: 32px; color: var(--text-primary); margin: 32px 0 16px 0; line-height: 1.2; text-transform: uppercase; letter-spacing: -1px;}
        .notion-editor h2 { font-size: 24px; color: var(--text-primary); margin: 24px 0 12px 0; line-height: 1.3;}
        .notion-editor ul { padding-left: 24px; margin-bottom: 16px; }
        .notion-editor input[type="checkbox"] { margin-right: 12px; transform: scale(1.4); accent-color: var(--os-accent);}

        /* Project Tracker App */
        .tracker-app { padding: 40px; color: var(--text-primary); height: 100%; overflow-y: auto; }
        .tracker-header { margin-bottom: 40px; border-bottom: 2px solid var(--text-secondary); padding-bottom: 20px;}
        .tracker-header h3 { font-size: 28px; color: var(--text-primary); margin-bottom: 8px; letter-spacing: -1px;}
        .tracker-header p { font-family: var(--font-mono); color: var(--os-accent); font-size: 14px; text-transform: uppercase; font-weight: 700;}
        
        .proj-card { background: var(--os-bg); border: 2px solid var(--text-secondary); padding: 24px; margin-bottom: 24px; transition: border-color 0.1s ease; box-shadow: 8px 8px 0px var(--panel-shadow);}
        .proj-card:hover { border-color: var(--os-accent); }
        .proj-title { font-size: 20px; font-weight: 800; margin-bottom: 16px; display: flex; justify-content: space-between; text-transform: uppercase; letter-spacing: -0.5px;}
        .proj-progress { width: 100%; height: 8px; background: var(--panel-bg); border: 1px solid var(--text-secondary); margin-bottom: 20px;}
        .proj-progress-bar { height: 100%; background: var(--os-accent); transition: width 0.3s ease; }
        
        .task-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px dashed var(--panel-border); cursor: pointer; font-size: 15px; font-family: var(--font-mono);}
        .task-item:last-child { border-bottom: none; }
        .task-item .checkbox { width: 20px; height: 20px; border: 2px solid var(--text-secondary); display: flex; align-items: center; justify-content: center; transition: background 0.1s; background: var(--os-bg);}
        .task-item.done .checkbox { background: var(--os-accent); border-color: var(--os-accent); }
        .task-item.done .checkbox::after { content: 'вң“'; color: var(--os-bg); font-weight: bold; font-size: 14px;}
        .task-item.done span { text-decoration: line-through; color: var(--text-secondary); }

        .app-input-row { display: flex; gap: 16px; margin-bottom: 24px; }
        .app-input { flex: 1; background: var(--os-bg); border: 2px solid var(--text-secondary); padding: 14px 16px; color: var(--text-primary); font-family: var(--font-mono); outline: none; font-size: 14px; font-weight: 600;}
        .app-input:focus { border-color: var(--os-accent); }
        
        /* Settings App */
        .settings-app { padding: 40px; color: var(--text-primary); height: 100%; overflow-y: auto; }
        .settings-section { margin-bottom: 40px; }
        .settings-section h2 { font-size: 16px; text-transform: uppercase; letter-spacing: 2px; color: var(--os-accent); margin-bottom: 20px; font-family: var(--font-mono); border-bottom: 2px solid var(--panel-border); padding-bottom: 12px;}
        .settings-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; background: var(--os-bg); padding: 16px 20px; border: 2px solid var(--text-secondary); font-size: 15px; font-family: var(--font-mono); font-weight: 600;}
        .settings-slider { -webkit-appearance: none; width: 160px; height: 8px; background: var(--panel-bg); border: 2px solid var(--text-secondary); outline: none; }
        .settings-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 20px; height: 28px; background: var(--text-primary); cursor: pointer; border: 2px solid var(--os-bg); }
        .settings-slider::-webkit-slider-thumb:hover { background: var(--os-accent); }
        .settings-color { -webkit-appearance: none; border: none; width: 36px; height: 36px; cursor: pointer; background: transparent; padding: 0;}
        .settings-color::-webkit-color-swatch-wrapper { padding: 0; }
        .settings-color::-webkit-color-swatch { border: 2px solid var(--text-secondary); border-radius: 0; }

        /* Flappy Game */
        .flappy-app { position: relative; width: 100%; height: 100%; overflow: hidden; outline: none; user-select: none; background: var(--os-bg);}
        .flappy-bird { position: absolute; width: 28px; height: 28px; background: var(--os-accent); border: 2px solid var(--text-primary); left: 60px; top: 150px; transition: transform 0.1s linear, background 0.1s ease; z-index: 5; box-shadow: 4px 4px 0px var(--panel-shadow);}
        .flappy-pipe { position: absolute; width: 70px; background: var(--panel-bg); border: 2px solid var(--os-accent); z-index: 4; box-shadow: 4px 4px 0px var(--panel-shadow);}
        .flappy-score { position: absolute; top: 24px; width: 100%; text-align: center; font-size: 72px; font-family: var(--font-mono); font-weight: 800; color: var(--text-primary); z-index: 10; text-shadow: 6px 6px 0px var(--os-bg); pointer-events: none;}
        .flappy-msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: var(--font-mono); color: var(--os-bg); font-size: 16px; font-weight: 700; text-transform: uppercase; text-align: center; background: var(--text-primary); padding: 24px 40px; border: 4px solid var(--os-bg); cursor: pointer; z-index: 10; box-shadow: 12px 12px 0px var(--os-accent);}
    </style>
</head>
<body>

    <!-- Spotlight Search Overlay -->
    <div id="spotlight-overlay">
        <div class="spotlight-box">

            mouseY = e.clientY;
        });

            document.documentElement.style.setProperty('--os-accent', color);

        function toggleSpotlight() {
            const spot = document.getElementById('spotlight-overlay');
            const inp = document.getElementById('spotlight-input');
            if (spot.style.display === 'none' || spot.style.display === '') {
                spot.style.display = 'flex';
                inp.value = '';
                inp.focus();
            } else {
                spot.style.display = 'none';
            }
        }
        window.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                e.preventDefault();
                toggleSpotlight();
            }
            if (e.key === 'Escape') {
                document.getElementById('spotlight-overlay').style.display = 'none';
            }
        });
        document.getElementById('spotlight-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const val = e.target.value.toLowerCase().trim();
                const args = val.split(' ');
                if (appRegistry[args[0]]) { openApp(args[0]); } 
                else { handleCommand(val); }
                document.getElementById('spotlight-overlay').style.display = 'none';
            }
        });

        // --- Alive Canvas Blob Engine ---
        const blobCanvas = document.getElementById('blob-canvas');
        const bctx = blobCanvas ? blobCanvas.getContext('2d') : null;
        window.isBgEnabled = true; // Setting toggle for canvas background
        let activeBlobs = 3;
        let auras = [];
        
        function initAuras() {
            auras = [];
            for(let i=1; i<=5; i++) {
                auras.push({
                    x: Math.random() * window.innerWidth,
                    y: Math.random() * window.innerHeight,
                    vx: (Math.random() - 0.5) * 2,
                    vy: (Math.random() - 0.5) * 2,
                    baseR: (Math.random() * 15 + 15) * (window.innerWidth/100),
                    colorVar: `--blob-${i}-color`
                });
            }
        }
        initAuras();

        function animateCanvas() {
            requestAnimationFrame(animateCanvas);
            
            const hasWindows = Object.keys(openWindows).length > 0;
            const isMatrix = document.getElementById('bg-ascii-container').style.display === 'flex';
            
            // Smart Toggle: Hide canvas if setting is off OR if any window is open OR if ascii art is showing.
            const shouldDraw = window.isBgEnabled && !hasWindows && !isMatrix;
            
            if (!shouldDraw) {
                blobCanvas.style.opacity = '0';
                return;
            }
            
            blobCanvas.style.opacity = '1';
            
            blobCanvas.width = window.innerWidth;
            blobCanvas.height = window.innerHeight;
            bctx.clearRect(0, 0, blobCanvas.width, blobCanvas.height);
            
            const style = getComputedStyle(document.documentElement);
            bctx.filter = `blur(140px)`;
            bctx.globalAlpha = 0.55;
            
            for (let i = 0; i < activeBlobs; i++) {
                let aura = auras[i];
                
                // Float physics
                aura.x += aura.vx;
                aura.y += aura.vy;
                
                // Bounce off walls properly without clipping
                if (aura.x - aura.baseR <= 0) { aura.x = aura.baseR; aura.vx *= -1; }
                else if (aura.x + aura.baseR >= window.innerWidth) { aura.x = window.innerWidth - aura.baseR; aura.vx *= -1; }

                if (aura.y - aura.baseR <= 0) { aura.y = aura.baseR; aura.vy *= -1; }
                else if (aura.y + aura.baseR >= window.innerHeight) { aura.y = window.innerHeight - aura.baseR; aura.vy *= -1; }

                // React to mouse (kinetic dodge)
                let dx = aura.x - mouseX;
                let dy = aura.y - mouseY;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if(dist < 300) {
                    aura.x += (dx / dist) * 2;
                    aura.y += (dy / dist) * 2;
                }
                
                bctx.beginPath();
                bctx.arc(aura.x, aura.y, aura.baseR, 0, Math.PI * 2);
                bctx.fillStyle = style.getPropertyValue(aura.colorVar).trim();
                bctx.fill();
            }
        }
        animateCanvas();
        window.addEventListener('resize', initAuras);

                    <span class="sticky-close" onclick="document.getElementById('${id}').remove()">вң•</span>
                </div>
                <div class="sticky-content" contenteditable="true" spellcheck="false">Record fragment...</div>
            `;
            document.getElementById('window-layer').appendChild(sticky);

            let isDown = false, sX = 0, sY = 0;
            const header = sticky.querySelector('.sticky-header');
            header.onpointerdown = (ev) => {
                isDown = true; sX = ev.clientX; sY = ev.clientY;
                document.onpointermove = (em) => {
                    if(!isDown) return;
                    sticky.style.left = (sticky.offsetLeft - (sX - em.clientX)) + 'px';
                    sticky.style.top = (sticky.offsetTop - (sY - em.clientY)) + 'px';
                    sX = em.clientX; sY = em.clientY;
                };
                document.onpointerup = () => { isDown = false; document.onpointermove = null; };
            };

        function setAsciiBackground(type) {
            const container = document.getElementById('bg-ascii-container');
            const blobCanvas = document.getElementById('blob-canvas');
            let content = asciiArtDB[type];
            let color = "#ffffff";
            
            if (type === 'david' || type === 'edgerunners') color = "var(--ascii-color, #f1c40f)";
            else if (type === 'lucy') color = "#00ffcc";
            else if (type === 'moon') color = "#ffffff";
            else if (type === 'house') color = "#ffaa00";
            else if (type === 'redjohn') color = "var(--mac-red)";
            else if (type && type.startsWith('kanye')) color = "#a652e4";

            if (content) {
                if(blobCanvas) blobCanvas.style.display = 'none';
                container.innerHTML = content;
                container.style.color = color;
                container.style.display = 'flex';
                void container.offsetWidth;
                container.style.opacity = 1;
                document.documentElement.style.setProperty('--os-accent', color.startsWith('var') ? '#f1c40f' : color);
            } else {
                container.style.opacity = 0;
                setTimeout(() => {
                    container.style.display = 'none';
                    if(blobCanvas) blobCanvas.style.display = 'block';
                    document.documentElement.style.setProperty('--os-accent', getComputedStyle(document.documentElement).getPropertyValue('--blob-1-color').trim());
                }, 500);
            }
        }

        window.changeClockPos = function(posClass) {
            document.getElementById('desktop-bg-widget').className = 'desktop-bg-widget ' + posClass;
        }

        window.toggleBg = function() {
            window.isBgEnabled = !window.isBgEnabled;
        }

        // --- Pomodoro Management Engine ---
        window.togglePomo = function() {
            if (pomoIsRunning) {
                clearInterval(pomoInterval);
                document.getElementById('pomo-start-btn').innerText = 'START';
                document.getElementById('pomo-start-btn').classList.remove('active');
            } else {
                document.getElementById('pomo-start-btn').classList.add('active');
                pomoInterval = setInterval(() => {
                    if (pomoSeconds === 0) {
                        if (pomoMinutes === 0) {
                            pomoMode = pomoMode === 'Work' ? 'Break' : 'Work';
                            pomoMinutes = pomoMode === 'Work' ? 25 : 5;
                        } else {
                            pomoMinutes--; pomoSeconds = 59;
                        }
                    } else {
                        pomoSeconds--;
                    }
                    displayPomo();
                }, 1000);
                document.getElementById('pomo-start-btn').innerText = 'PAUSE';
            }
            pomoIsRunning = !pomoIsRunning;
        }

        window.resetPomo = function(mins = 25) {
            clearInterval(pomoInterval);
            pomoIsRunning = false;
            pomoMode = mins === 25 ? 'Work' : 'Break';
            pomoMinutes = mins; pomoSeconds = 0;
            const startBtn = document.getElementById('pomo-start-btn');
            if(startBtn) { startBtn.innerText = 'START'; startBtn.classList.remove('active'); }
            displayPomo();
        }

        function displayPomo() {
            const timeEl = document.getElementById('pomo-display');
            if (timeEl) {
                timeEl.innerText = `${String(pomoMinutes).padStart(2,'0')}:${String(pomoSeconds).padStart(2,'0')}`;
            }
        }

        function handleCommand(cmdRaw) {
            if (!cmdRaw) return;
            const cmd = cmdRaw.toLowerCase().trim();
            const args = cmd.split(' ');
            const action = args[0];
            const target = args[1];

            termHistory.push(`<span class="term-prompt">root@yves:~$</span> ${cmdRaw}`);
            let output = "";

            if (cmd === 'david' || cmd === 'edgerunners') {
                setAsciiBackground('david'); output = "Loaded workspace context: Sandevistan Calibration.";
            } else if (cmd === 'lucy') {
                setAsciiBackground('lucy'); output = "Loaded workspace context: Lucy Deep-Dive Log.";
            } else if (cmd === 'moon') {
                setAsciiBackground('moon'); output = "Loaded workspace context: Lunar Core Vector.";
            } else if (cmd === 'house' || cmd === 'diagnose') {
                setAsciiBackground('house'); output = "Loaded medical layout: House M.D. Core Vector Grid.";
            } else if (cmd === 'redjohn' || cmd === 'mentalist') {
                setAsciiBackground('redjohn'); output = "Warning: Bloody smiley context override established.";
            } else if (action === 'kanye' && target === 'graduation') {
                setAsciiBackground('kanyegraduation'); output = "Background Layer: Dropout Bear Vector Blueprint.";
            } else if (action === 'kanye' && target === '808s') {
                setAsciiBackground('kanye808s'); output = "Background Layer: Heart Balloon Matrix Node.";
            } else if (action === 'kanye' && target === 'yeezus') {
                setAsciiBackground('kanyeyeezus'); output = "Background Layer: High-Contrast Tape Array Asset.";
            } else if (cmd === 'resetbg') {
                setAsciiBackground(null); output = "Environment arrays completely localized back to dynamic canvas blobs.";
            } else if (action === 'open') {
                if (appRegistry[target]) { openApp(target); output = `Launching context container: ${target}`; }
                else output = `Context framework validation error: ${target}`;
            } else if (cmd === 'help') {
                output = "Commands: open [app], close [app], clear, resetbg\nArt vectors: david, lucy, moon, house, redjohn, kanye graduation, kanye 808s, kanye yeezus";
            } else if (cmd === 'clear') {
                termHistory = ["Yves.OS Terminal [Version 4.0.0]"]; output = null;
            } else {
                output = `Syntax compilation mismatch tokens near: "${cmdRaw}"`;
            }

            if (output) termHistory.push(output);
            renderTerminal();
        }

        function renderTerminal() {
            const termArea = document.getElementById('term-content');
            if (termArea) {
                termArea.innerHTML = termHistory.map(line => `<div class="term-line">${line}</div>`).join('');
                termArea.scrollTop = termArea.scrollHeight;
            }
        }

        // --- Workspace (Notion Style Document Editor Engine) ---
        window.renderNotion = function() {
            const container = document.getElementById('notion-content');
            if (!container) return;
            
            let sidebarHtml = `<div class="notion-sidebar"><div class="notion-sidebar-header"><span>Workspace</span><span class="notion-add-btn" onclick="addNotionPage()">+</span></div><div class="notion-page-list">`;
            notionData.forEach(page => {
                sidebarHtml += `<div class="notion-page-item ${page.id === activeNotionPageId ? 'active' : ''}" onclick="selectNotionPage(${page.id})"><span>${page.icon}</span><span>${page.title || 'Untitled'}</span></div>`;
            });
            sidebarHtml += `</div></div>`;
            
            const activePage = notionData.find(p => p.id === activeNotionPageId) || notionData[0];
            const mainHtml = `
                <div class="notion-main">
                    <div class="notion-cover"><div class="notion-icon-picker">${activePage.icon}</div></div>
                    <div class="notion-content-wrapper">
                        <input type="text" class="notion-title-input" value="${activePage.title}" placeholder="Untitled" oninput="updateNotionTitle(${activePage.id}, this.value)">
                        <div class="notion-toolbar">
                            <button class="notion-tool-btn" onclick="formatNotion('formatBlock', 'H1')">H1</button>
                            <button class="notion-tool-btn" onclick="formatNotion('formatBlock', 'H2')">H2</button>
                            <button class="notion-tool-btn" onclick="formatNotion('bold')">B</button>
                            <button class="notion-tool-btn" onclick="formatNotion('italic')">I</button>
                            <button class="notion-tool-btn" onclick="formatNotion('insertUnorderedList')">вҖў List</button>
                        </div>
                        <div class="notion-editor" contenteditable="true" oninput="updateNotionContent(${activePage.id}, this.innerHTML)">${activePage.content}</div>
                    </div>
                </div>
            `;
            container.innerHTML = sidebarHtml + mainHtml;
        }

        window.addNotionPage = function() {
            const newId = Date.now();
            notionData.push({ id: newId, title: "Untitled Space", icon: "рҹ“„", content: "" });
            activeNotionPageId = newId;
            renderNotion();
        }
        window.selectNotionPage = function(id) { activeNotionPageId = id; renderNotion(); }
        window.updateNotionTitle = function(id, title) {
            const page = notionData.find(p => p.id === id);
            if (page) { page.title = title; renderNotion(); }
        }
        window.updateNotionContent = function(id, content) {
            const page = notionData.find(p => p.id === id);
            if (page) page.content = content;
        }
        window.formatNotion = function(command, value = null) {
            document.execCommand(command, false, value);
        }

        // --- Core Task Management Architecture ---
        window.renderProjects = function() {
            const area = document.getElementById('projects-content');
            if (!area) return;
            let html = `<div class="tracker-header"><h3>Active Trackers</h3><p>Log your execution states.</p></div>
                        <div class="app-input-row"><input type="text" id="new-proj-input" class="app-input" placeholder="New page track..."><button class="app-btn" onclick="addProject()">Add Track</button></div>`;
            projectsData.forEach(p => {
                const total = p.tasks.length, done = p.tasks.filter(t => t.done).length, pct = total === 0 ? 0 : (done/total)*100;
                const ratioText = done + "/" + total;
                html += `
                <div class="proj-card">
                    <div class="proj-title"><span>${p.name}</span><span style="font-size:13px;color:var(--os-accent);">${ratioText}</span></div>
                    <div class="proj-progress"><div class="proj-progress-bar" style="width: ${pct}%"></div></div>
                    <div class="task-list">
                `;
                p.tasks.forEach((t, i) => {
                    html += `
                    <div class="task-item ${t.done ? 'done' : ''}" onclick="toggleTask(${p.id}, ${i})">
                        <div style="display: flex; align-items: center; gap: 12px;">
                            <div class="checkbox"></div>
                            <span>${t.t}</span>
                        </div>
                        <span class="delete-task-btn" onclick="deleteTask(${p.id}, ${i}, event)" style="color: var(--text-secondary); cursor: pointer; font-size: 14px; padding: 0 4px; transition: color 0.2s;" onmouseover="this.style.color='var(--mac-red)'" onmouseout="this.style.color='var(--text-secondary)'">вң•</span>
                    </div>`;
                });
                html += `
                        <div class="app-input-row" style="margin-top:12px;margin-bottom:0;">
                            <input type="text" id="new-task-${p.id}" class="app-input" style="padding:4px 8px;font-size:13px;" placeholder="Next step metrics...">
                            <button class="app-btn" style="padding:4px 12px;font-size:13px;" onclick="addTask(${p.id}, event)">Add</button>
                        </div>
                    </div></div>`;
            });
            area.innerHTML = html;
        }

        window.addProject = function() {
            const inp = document.getElementById('new-proj-input');
            if(inp && inp.value.trim()) { projectsData.push({ id: Date.now(), name: inp.value.trim(), tasks: [] }); renderProjects(); }
        }
        window.addTask = function(pid, e) {
            e.stopPropagation();
            const inp = document.getElementById(`new-task-${pid}`);
            if(inp && inp.value.trim()) {
                const proj = projectsData.find(p => p.id === pid);
                if(proj) { proj.tasks.push({ t: inp.value.trim(), done: false }); renderProjects(); }
            }
        }
        window.toggleTask = function(pid, tIndex) {
            const proj = projectsData.find(p => p.id === pid);
            if(proj && proj.tasks[tIndex]) { proj.tasks[tIndex].done = !proj.tasks[tIndex].done; renderProjects(); }
        }
        window.deleteTask = function(pid, tIndex, event) {
            event.stopPropagation();
            const proj = projectsData.find(p => p.id === pid);
            if (proj && proj.tasks[tIndex]) {
                proj.tasks.splice(tIndex, 1);
                renderProjects();
            }
        }

        window.updateAuraCount = function(count) {
            activeBlobs = parseInt(count);
            document.getElementById('aura-count-val').innerText = count;
        }

        // --- Arcade Engine Core (Flappy Game) ---
        window.startFlappyGame = function() {
            const container = document.getElementById('flappy-container');
            if (!container) return;
            const bird = document.getElementById('flappy-bird'), pipesContainer = document.getElementById('flappy-pipes');
            const scoreEl = document.getElementById('flappy-score'), msgEl = document.getElementById('flappy-msg');
            let isPlaying = false, isGameOver = false, birdY = container.offsetHeight / 2 || 150;
            let velocity = 0, gravity = 0.4, jumpForce = -6, pipes = [], score = 0, frameCount = 0;

            if(window.flappyLoopId) cancelAnimationFrame(window.flappyLoopId);

            const resetGame = () => {
                birdY = container.offsetHeight / 2 || 150; velocity = 0; pipes = []; score = 0;
                pipesContainer.innerHTML = ''; scoreEl.innerText = score;
                bird.style.top = birdY + 'px'; msgEl.style.display = 'none';
                isPlaying = true; isGameOver = false; frameCount = 0; gameLoop();
            };

            const jump = () => { if (isGameOver || !isPlaying) resetGame(); else velocity = jumpForce; };
            container.onclick = jump;
            container.onkeydown = (e) => { if (e.code === 'Space') { e.preventDefault(); jump(); } };
            container.focus();

            const gameOver = () => { isPlaying = false; isGameOver = true; cancelAnimationFrame(window.flappyLoopId); msgEl.style.display = 'block'; };

            const createPipe = () => {
                const gap = 140, minHeight = 40, maxPos = container.offsetHeight - minHeight - gap;
                const topHeight = Math.floor(Math.random() * (maxPos - minHeight + 1) + minHeight);
                const pipeTop = document.createElement('div');
                pipeTop.className = 'flappy-pipe'; pipeTop.style.height = topHeight + 'px'; pipeTop.style.top = '0'; pipeTop.style.left = container.offsetWidth + 'px';
                const pipeBottom = document.createElement('div');
                pipeBottom.className = 'flappy-pipe'; pipeBottom.style.height = (container.offsetHeight - topHeight - gap) + 'px'; pipeBottom.style.bottom = '0'; pipeBottom.style.left = container.offsetWidth + 'px';
                pipesContainer.appendChild(pipeTop); pipesContainer.appendChild(pipeBottom);
                pipes.push({ x: container.offsetWidth, top: pipeTop, bottom: pipeBottom, passed: false });
            };

            const gameLoop = () => {
                if (!isPlaying) return;
                velocity += gravity; birdY += velocity; bird.style.top = birdY + 'px';
                if (birdY < 0 || birdY > container.offsetHeight - 24) { gameOver(); return; }
                if (frameCount % 120 === 0) createPipe();
                for (let i = 0; i < pipes.length; i++) {
                    let p = pipes[i]; p.x -= 2.5; p.top.style.left = p.x + 'px'; p.bottom.style.left = p.x + 'px';
                    const birdRect = { top: birdY, bottom: birdY + 24, left: 60, right: 84 };
                    const topRect = { top: 0, bottom: parseFloat(p.top.style.height), left: p.x, right: p.x + 60 };
                    const botRect = { top: container.offsetHeight - parseFloat(p.bottom.style.height), bottom: container.offsetHeight, left: p.x, right: p.x + 60 };
                    if ((birdRect.right > topRect.left && birdRect.left < topRect.right && birdRect.top < topRect.bottom) ||
                        (birdRect.right > botRect.left && birdRect.left < botRect.right && birdRect.bottom > botRect.top)) { gameOver(); return; }
                    if (p.x + 60 < 60 && !p.passed) { p.passed = true; score++; scoreEl.innerText = score; }
                }
                if (pipes.length > 0 && pipes[0].x < -60) { pipes[0].top.remove(); pipes[0].bottom.remove(); pipes.shift(); }
                frameCount++; window.flappyLoopId = requestAnimationFrame(gameLoop);
            };
        }

        window.updateCSS = (varName, value) => {
            document.documentElement.style.setProperty(varName, value);
            if (varName.includes('--blob-')) {
                // Update internal array so animation picks it up immediately
                initAuras(); 
            }
            if (varName === '--blob-1-color' && document.getElementById('bg-ascii-container').style.display !== 'flex') {
                setOSAccent(value);
            }
        };

        function updateClock() {
            const now = new Date();
            const days = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
            const fullDays = ['SUNDAY', 'MONDAY', 'TUESDAY', 'WEDNESDAY', 'THURSDAY', 'FRIDAY', 'SATURDAY'];
            const months = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];
            let h = now.getHours();
            const m = String(now.getMinutes()).padStart(2, '0');
            const ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12;
            
            document.getElementById('sys-clock-small').textContent = `${days[now.getDay()]} ${now.getDate()} ${months[now.getMonth()]} ${h}:${m} ${ampm}`;
            document.getElementById('bg-clock').innerHTML = `${String(h).padStart(2,'0')}<span style="opacity: ${now.getSeconds() % 2 === 0 ? 1 : 0.2}">:</span>${m}`;
            document.getElementById('bg-date').textContent = `${fullDays[now.getDay()]}, ${months[now.getMonth()]} ${String(now.getDate()).padStart(2,'0')}`;
            
            const dashHeader = document.querySelector('.dash-header h1');
            if(dashHeader) {
                let currentH = now.getHours();
                if(currentH < 12) dashHeader.textContent = "Good Morning.";
                else if(currentH < 18) dashHeader.textContent = "Good Afternoon.";
                else dashHeader.textContent = "Good Evening.";
            }
        }

        window.onload = () => {
            setOSAccent(getComputedStyle(document.documentElement).getPropertyValue('--blob-1-color').trim());
            updateClock();
            setInterval(updateClock, 1000);
            openApp('dashboard'); 
        };
    </script>
</body>
</html>
