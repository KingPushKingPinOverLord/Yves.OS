<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yves.OS</title>
    
    <!-- Outfit (Modern UI), DotGothic16 (Nothing OS vibe), Lora (Editorial), Fira Code (CLI) -->
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Fira+Code:wght@400;500;700&family=Lora:ital,wght@0,400;0,500;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            /* True Glassmorphism Variables */
            --glass-bg: rgba(20, 20, 25, 0.45);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-border-highlight: rgba(255, 255, 255, 0.25);
            --glass-blur: 35px;
            --glass-saturate: 180%;
            
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
            
            /* Dynamic OS Accent Color - Changes based on background */
            --os-accent: #ff3b30; 
            
            --mac-red: #ff3b30;
            --mac-yellow: #f1c40f;
            --mac-green: #2ecc71;
            
            --shadow-glass: 0 24px 48px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            
            /* Customization Variables */
            --bg-base: #0a0a0c;
            --blob-1-color: #ff3b30;
            --blob-2-color: #5e5ce6;
            --blob-3-color: #007aff;
            --blob-4-color: #ff2d55;
            --blob-5-color: #34c759;
            --ascii-color: #f1c40f;

            --font-ui: 'Outfit', sans-serif;
            --font-main: 'Lora', serif;
            --font-mono: 'Fira Code', monospace;
            --font-dot: 'DotGothic16', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-drag: none; }

        body, html {
            width: 100%; height: 100%; overflow: hidden;
            font-family: var(--font-ui); color: var(--text-primary);
            background-color: #000000;
        }

        .bg-container {
            position: absolute; inset: 0; z-index: 0; overflow: hidden;
            background: var(--bg-base); transition: background 0.3s ease;
        }

        .blob {
            position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.6;
            transition: background 0.3s ease, opacity 0.5s ease;
            display: none; 
        }
        .blob.active { display: block; }

        .blob-1 { width: 60vw; height: 60vw; background: var(--blob-1-color); top: -10vw; left: -10vw; }
        .blob-2 { width: 50vw; height: 50vw; background: var(--blob-2-color); bottom: -10vw; right: -10vw; }
        .blob-3 { width: 45vw; height: 45vw; background: var(--blob-3-color); top: 20vh; left: 30vw; }
        .blob-4 { width: 40vw; height: 40vw; background: var(--blob-4-color); top: 50vh; left: -10vw; }
        .blob-5 { width: 55vw; height: 55vw; background: var(--blob-5-color); top: -20vh; right: 10vw; }

        #bg-ascii-container {
            position: absolute; inset: 0; z-index: 1; display: none;
            justify-content: center; align-items: center;
            font-family: var(--font-mono); white-space: pre; line-height: 1.1; overflow: hidden;
            opacity: 0; transition: opacity 0.5s ease, color 0.3s ease;
            text-shadow: 0 0 15px currentColor;
            font-size: min(0.7vw, 1.2vh); 
        }

        .noise-overlay {
            position: absolute; inset: 0;
            background-image: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
            opacity: 0.15; mix-blend-mode: overlay; z-index: 1; pointer-events: none;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate));
            -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate));
            border: 1px solid var(--glass-border);
            border-top: 1px solid var(--glass-border-highlight);
            border-left: 1px solid var(--glass-border-highlight);
            box-shadow: var(--shadow-glass);
        }

        .top-bar {
            height: 36px; width: 100%; position: absolute; top: 0; left: 0;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 16px; z-index: 9999; font-size: 14px; font-weight: 500;
            border-radius: 0; border-top: none; border-left: none; border-right: none;
        }

        .top-bar-left, .top-bar-right { display: flex; align-items: center; gap: 16px; }

        .menu-item {
            cursor: pointer; display: flex; align-items: center; gap: 8px;
            padding: 4px 10px; border-radius: 6px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .menu-item:hover { background: rgba(255, 255, 255, 0.15); transform: scale(1.08) translateY(-2px); }
        .menu-icon-svg { width: 16px; height: 16px; fill: none; stroke: var(--os-accent); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; transition: stroke 0.3s ease; }
        
        .desktop-bg-widget {
            position: absolute; z-index: 2; pointer-events: none; transition: all 0.5s ease;
        }
        .desktop-bg-widget.pos-center { top: 45%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
        .desktop-bg-widget.pos-top-left { top: 8%; left: 5%; transform: none; text-align: left; }
        .desktop-bg-widget.pos-top-right { top: 8%; left: auto; right: 5%; transform: none; text-align: right; }

        .nothing-clock { font-family: var(--font-dot); font-size: clamp(80px, 12vw, 160px); line-height: 1; color: rgba(255, 255, 255, 0.9); letter-spacing: 4px; text-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .nothing-clock span { color: var(--os-accent); transition: color 0.3s ease;}
        .nothing-date { font-family: var(--font-mono); font-size: 16px; letter-spacing: 2px; color: rgba(255, 255, 255, 0.7); margin-top: 10px; text-transform: uppercase; }

        .cli-hybrid-container {
            position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%);
            width: 500px; max-width: 90%; z-index: 9998; padding: 12px 20px; border-radius: 16px;
            display: flex; align-items: center; gap: 12px; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .cli-hybrid-container:focus-within { transform: translateX(-50%) scale(1.02); background: rgba(40, 40, 50, 0.6); }
        .cli-hybrid-container span { font-family: var(--font-mono); color: var(--os-accent); font-weight: 700; font-size: 16px; transition: color 0.3s ease;}
        .cli-input { flex: 1; background: transparent; border: none; outline: none; color: #fff; font-family: var(--font-mono); font-size: 14px; caret-color: var(--os-accent); }

        .dock-container {
            position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
            padding: 10px 14px; border-radius: 28px; display: flex; align-items: center; gap: 12px; z-index: 9999;
        }
        .dock-item { width: 52px; height: 52px; cursor: pointer; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; display: flex; align-items: center; justify-content: center; }
        .dock-item:hover { transform: scale(1.3) translateY(-12px); z-index: 2; }
        
        .dock-icon-wrapper {
            width: 100%; height: 100%; border-radius: 12px; background: rgba(255,255,255,0.05);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3); pointer-events: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .dock-item:hover .dock-icon-wrapper { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.3); }
        .dock-icon-wrapper svg { width: 28px; height: 28px; transition: all 0.3s ease; stroke: var(--os-accent); }
        .dock-item:hover .dock-icon-wrapper svg { filter: drop-shadow(0 0 8px var(--os-accent)); transform: scale(1.1); }

        .dock-indicator { width: 4px; height: 4px; background: var(--os-accent); border-radius: 50%; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%); display: none; transition: background 0.3s ease;}
        .dock-item.active .dock-indicator { display: block; box-shadow: 0 0 8px var(--os-accent); }

        .window {
            position: absolute; border-radius: 16px; display: flex; flex-direction: column;
            overflow: hidden; min-width: 320px; min-height: 200px; z-index: 100;
            transition: opacity 0.2s, transform 0.1s, top 0.25s cubic-bezier(0.1, 0.9, 0.2, 1), left 0.25s cubic-bezier(0.1, 0.9, 0.2, 1), width 0.25s cubic-bezier(0.1, 0.9, 0.2, 1), height 0.25s cubic-bezier(0.1, 0.9, 0.2, 1);
        }
        .window.maximized { border-radius: 0px !important; }
        .window-header {
            height: 44px; display: flex; align-items: center; justify-content: center;
            padding: 0 16px; cursor: move; border-bottom: 1px solid rgba(255,255,255,0.05); position: relative; background: rgba(0,0,0,0.1);
        }
        .mac-controls { position: absolute; left: 16px; display: flex; gap: 8px; }
        .mac-btn {
            width: 12px; height: 12px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.2);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.2s;
        }
        .mac-btn:hover { filter: brightness(0.8); transform: scale(1.4); }
        .mac-close { background: var(--mac-red); } .mac-min { background: var(--mac-yellow); } .mac-max { background: var(--mac-green); }
        
        .window-title { font-family: var(--font-ui); font-size: 14px; font-weight: 500; pointer-events: none; display: flex; align-items: center; gap: 8px; color: #fff;}
        .window-title svg { width: 16px; height: 16px; stroke: var(--os-accent); transition: stroke 0.3s ease;}
        .window-content { flex: 1; position: relative; overflow: auto; display: flex; flex-direction: column; background: rgba(0,0,0,0.2); }
        h1, h2, h3 { font-family: var(--font-ui); font-weight: 500; }

        /* Dashboard App */
        .dash-app { padding: 32px; display: flex; flex-direction: column; gap: 24px; height: 100%; }
        .dash-header h1 { font-size: 28px; color: #fff; margin-bottom: 4px; }
        .dash-header p { font-size: 14px; color: var(--text-secondary); }
        .dash-focus-box { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 20px; border-radius: 12px; }
        .dash-focus-box h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--os-accent); margin-bottom: 12px; transition: color 0.3s ease;}
        .dash-input { width: 100%; background: transparent; border: none; border-bottom: 2px solid rgba(255,255,255,0.2); color: #fff; font-size: 18px; padding: 8px 0; outline: none; transition: border-color 0.3s ease; font-family: var(--font-main); font-style: italic;}
        .dash-input:focus { border-color: var(--os-accent); }
        
        /* Terminal App */
        .terminal-app { padding: 20px; font-family: var(--font-mono); font-size: 13px; color: #fff; height: 100%; overflow-y: auto; background: rgba(0,0,0,0.4); }
        .term-line { margin-bottom: 8px; line-height: 1.5; white-space: pre-wrap; word-break: break-all;}
        .term-prompt { color: var(--os-accent); margin-right: 8px; font-weight: bold; transition: color 0.3s ease;}
        
        .ascii-art { white-space: pre; font-family: var(--font-mono); line-height: 1.2; margin: 12px 0; font-size: 12px; letter-spacing: 2px; text-shadow: 0 0 8px currentColor; }
        
        /* Focus Timer App */
        .focus-app { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 20px; }
        .timer-display { font-family: var(--font-dot); font-size: 80px; color: #fff; line-height: 1; margin-bottom: 32px; letter-spacing: 4px; text-shadow: 0 0 20px rgba(255,255,255,0.2);}
        .timer-controls { display: flex; gap: 16px; }
        .pomo-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 10px 24px; border-radius: 8px; font-family: var(--font-ui); font-weight: 600; cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .pomo-btn:hover { background: rgba(255,255,255,0.2); transform: scale(1.05); }
        .pomo-btn.active { background: var(--os-accent); border-color: var(--os-accent); color: #000; box-shadow: 0 0 15px var(--os-accent); }

        /* Workspace (Notion Clone) */
        .notion-app { display: flex; height: 100%; color: #D4D4D4; background: rgba(0,0,0,0.4); border-radius: inherit; }
        .notion-sidebar { width: 200px; background: rgba(0,0,0,0.5); border-right: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; padding-top: 8px;}
        .notion-sidebar-header { padding: 12px 16px; font-family: var(--font-ui); font-weight: 500; font-size: 13px; color: #9B9B9B; display: flex; justify-content: space-between; align-items: center; }
        .notion-add-btn { cursor: pointer; color: #9B9B9B; font-size: 18px; line-height: 1; transition: color 0.2s; }
        .notion-add-btn:hover { color: #fff; }
        .notion-page-list { flex: 1; overflow-y: auto; padding: 0 8px; }
        .notion-page-item { padding: 6px 8px; border-radius: 4px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-family: var(--font-ui); font-size: 13px; color: #aaa; transition: all 0.2s; margin-bottom: 2px; }
        .notion-page-item:hover { background: rgba(255,255,255,0.05); color: #fff;}
        .notion-page-item.active { background: rgba(255,255,255,0.1); color: #fff; font-weight: 500; border-left: 2px solid var(--os-accent);}
        
        .notion-main { flex: 1; display: flex; flex-direction: column; overflow-y: auto; position: relative; }
        .notion-cover { height: 120px; background: linear-gradient(45deg, rgba(255,255,255,0.05), rgba(255,255,255,0.1)); position: relative; border-bottom: 1px solid rgba(255,255,255,0.05);}
        .notion-icon-picker { font-size: 48px; position: absolute; bottom: -24px; left: 32px; cursor: pointer; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));}
        .notion-content-wrapper { padding: 40px 32px 32px 32px; flex: 1; display: flex; flex-direction: column; max-width: 800px; margin: 0 auto; width: 100%;}
        .notion-title-input { font-size: 32px; font-weight: 700; background: transparent; border: none; color: #fff; outline: none; font-family: var(--font-ui); margin-bottom: 24px; }
        .notion-title-input::placeholder { color: #555; }
        
        .notion-toolbar { display: flex; gap: 6px; margin-bottom: 24px; position: sticky; top: 0; background: rgba(20,20,25,0.9); backdrop-filter: blur(10px); padding: 8px; border-radius: 8px; z-index: 10; border: 1px solid rgba(255,255,255,0.05); }
        .notion-tool-btn { background: transparent; border: 1px solid rgba(255,255,255,0.1); color: #D4D4D4; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-family: var(--font-ui); font-size: 12px; font-weight: 500; transition: all 0.2s; }
        .notion-tool-btn:hover { background: var(--os-accent); border-color: var(--os-accent); color: #000;}
        
        .notion-editor { flex: 1; outline: none; font-family: var(--font-ui); font-size: 15px; line-height: 1.6; color: #D4D4D4; }
        .notion-editor:empty:before { content: "Press '/' for commands, or type away..."; color: #555; pointer-events: none; }
        .notion-editor h1 { font-size: 26px; font-weight: 600; color: #fff; margin: 20px 0 10px 0; line-height: 1.2;}
        .notion-editor h2 { font-size: 20px; font-weight: 600; color: #fff; margin: 16px 0 8px 0; line-height: 1.3;}
        .notion-editor ul { padding-left: 24px; margin-bottom: 16px; }
        .notion-editor input[type="checkbox"] { margin-right: 8px; transform: scale(1.2); cursor: pointer; accent-color: var(--os-accent);}

        /* Project Tracker App */
        .tracker-app { padding: 24px; color: #fff; height: 100%; overflow-y: auto; }
        .tracker-header { margin-bottom: 24px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 16px;}
        .tracker-header h3 { font-family: var(--font-ui); color: var(--os-accent); font-size: 18px; margin-bottom: 4px; transition: color 0.3s ease;}
        .tracker-header p { color: var(--text-secondary); font-size: 14px;}
        
        .proj-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 16px; margin-bottom: 16px; transition: border-color 0.3s ease; }
        .proj-card:hover { border-color: rgba(255,255,255,0.2); }
        .proj-title { font-size: 16px; font-weight: 600; margin-bottom: 12px; display: flex; justify-content: space-between;}
        .proj-progress { width: 100%; height: 6px; background: rgba(0,0,0,0.3); border-radius: 3px; overflow: hidden; margin-bottom: 12px;}
        .proj-progress-bar { height: 100%; background: var(--os-accent); transition: width 0.3s ease, background 0.3s ease; }
        
        .task-item { display: flex; align-items: center; gap: 12px; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; font-size: 14px;}
        .task-item:last-child { border-bottom: none; }
        .task-item .checkbox { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.4); border-radius: 4px; display: flex; align-items: center; justify-content: center; transition: all 0.2s;}
        .task-item.done .checkbox { background: var(--os-accent); border-color: var(--os-accent); }
        .task-item.done .checkbox::after { content: '✓'; color: #000; font-weight: bold; font-size: 10px;}
        .task-item.done span { text-decoration: line-through; color: var(--text-secondary); }

        .app-input-row { display: flex; gap: 8px; margin-bottom: 16px; }
        .app-input { flex: 1; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); padding: 8px 12px; border-radius: 6px; color: #fff; font-family: var(--font-ui); outline: none; font-size: 13px;}
        .app-input:focus { border-color: rgba(255,255,255,0.3); }
        .app-btn { background: var(--os-accent); color: #000; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 13px; transition: opacity 0.2s, background 0.3s ease; }
        .app-btn:hover { opacity: 0.8; }

        /* Settings App */
        .settings-app { padding: 24px; color: #fff; height: 100%; overflow-y: auto; }
        .settings-section { margin-bottom: 24px; }
        .settings-section h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--os-accent); margin-bottom: 12px; font-family: var(--font-mono); transition: color 0.3s ease;}
        .settings-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; background: rgba(0,0,0,0.2); padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); font-size: 14px;}
        .settings-slider { -webkit-appearance: none; width: 120px; height: 4px; border-radius: 2px; background: rgba(255,255,255,0.2); outline: none; }
        .settings-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #fff; cursor: pointer; transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .settings-slider::-webkit-slider-thumb:hover { transform: scale(1.4); }
        .settings-color { -webkit-appearance: none; border: none; width: 28px; height: 28px; border-radius: 6px; cursor: pointer; background: transparent; padding: 0;}
        .settings-color::-webkit-color-swatch-wrapper { padding: 0; }
        .settings-color::-webkit-color-swatch { border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; }

        /* Flappy Game */
        .flappy-app { position: relative; width: 100%; height: 100%; overflow: hidden; outline: none; user-select: none; }
        .flappy-bird { position: absolute; width: 24px; height: 24px; background: var(--os-accent); border-radius: 50%; left: 60px; top: 150px; box-shadow: 0 0 15px var(--os-accent); transition: transform 0.1s linear, background 0.3s ease, box-shadow 0.3s ease; z-index: 5; }
        .flappy-pipe { position: absolute; width: 60px; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 4; }
        .flappy-score { position: absolute; top: 20px; width: 100%; text-align: center; font-size: 48px; font-family: var(--font-dot); font-weight: bold; color: #fff; z-index: 10; text-shadow: 0 4px 10px rgba(0,0,0,0.4); pointer-events: none;}
        .flappy-msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: var(--font-ui); color: #fff; font-size: 20px; text-align: center; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); padding: 20px 30px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; z-index: 10; box-shadow: 0 10px 30px rgba(0,0,0,0.5);}
    </style>
</head>
<body>

    <!-- Dynamic Background via HTML5 Canvas -->
    <div class="bg-container">
        <canvas id="blob-canvas" style="position:absolute; inset:0; z-index:0;"></canvas>
        <canvas id="matrix-canvas" style="display:none; position:absolute; inset:0; z-index:1; opacity:0.35; pointer-events:none;"></canvas>
        <div id="bg-ascii-container"></div>
        <div class="noise-overlay"></div>
    </div>

    <!-- Top Bar -->
    <div class="top-bar glass-panel">
        <div class="top-bar-left">
            <div class="menu-item" onclick="openApp('dashboard')">
                <svg class="menu-icon-svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
                <b style="font-weight: 600;">Yves.Os</b>
            </div>
            <div class="menu-item" style="color: var(--text-secondary);" id="active-app-name">Desktop</div>
        </div>
        <div class="top-bar-right">
            <div class="menu-item" style="font-size: 13px; font-weight: 500;" id="sys-clock-small">--:-- --</div>
        </div>
    </div>

    <!-- Nothing OS Desktop Widget (Clock moved to top left) -->

            if (!blobCanvas || !bctx) return;
            blobCanvas.width = window.innerWidth;
            blobCanvas.height = window.innerHeight;

            const style = getComputedStyle(document.documentElement);

            const h = blobCanvas.height;

        };

        function setAsciiBackground(type) {
            const container = document.getElementById('bg-ascii-container');
            const blobCanvas = document.getElementById('blob-canvas');
            let content = asciiArtDB[type];
            let color = "#ffffff";
            
            if (type === 'david' || type === 'edgerunners') color = "var(--ascii-color, #f1c40f)";
            else if (type === 'lucy') color = "#00ffcc";
            else if (type === 'moon') color = "#ffffff";
            else if (type === 'house') color = "#ffaa00";
            else if (type === 'redjohn') color = "var(--mac-red)";
            else if (type && type.startsWith('kanye')) color = "#a652e4";

            if (content) {
                if(blobCanvas) blobCanvas.style.display = 'none';
                container.innerHTML = content;
                container.style.color = color;
                container.style.display = 'flex';
                void container.offsetWidth;
                container.style.opacity = 1;
                document.documentElement.style.setProperty('--os-accent', color.startsWith('var') ? '#f1c40f' : color);
            } else {
                container.style.opacity = 0;
                setTimeout(() => {
                    container.style.display = 'none';
                    if(blobCanvas) blobCanvas.style.display = 'block';
                    document.documentElement.style.setProperty('--os-accent', getComputedStyle(document.documentElement).getPropertyValue('--blob-1-color').trim());
                }, 500);
            }
        }

        window.changeClockPos = function(posClass) {
            document.getElementById('desktop-bg-widget').className = 'desktop-bg-widget ' + posClass;
        }

        // --- Pomodoro Management Engine ---
        window.togglePomo = function() {
            if (pomoIsRunning) {
                clearInterval(pomoInterval);
                document.getElementById('pomo-start-btn').innerText = 'START';
            } else {
                pomoInterval = setInterval(() => {
                    if (pomoSeconds === 0) {
                        if (pomoMinutes === 0) {
                            pomoMode = pomoMode === 'Work' ? 'Break' : 'Work';
                            pomoMinutes = pomoMode === 'Work' ? 25 : 5;
                            showMsg("Timer Protocol", `${pomoMode} block starting now.`);
                        } else {
                            pomoMinutes--; pomoSeconds = 59;
                        }
                    } else {
                        pomoSeconds--;
                    }
                    displayPomo();
                }, 1000);
                document.getElementById('pomo-start-btn').innerText = 'PAUSE';
            }
            pomoIsRunning = !pomoIsRunning;
        }

        window.resetPomo = function(mins = 25) {
            clearInterval(pomoInterval);
            pomoIsRunning = false;
            pomoMode = 'Work';
            pomoMinutes = mins; pomoSeconds = 0;
            const startBtn = document.getElementById('pomo-start-btn');
            if(startBtn) startBtn.innerText = 'START';
            displayPomo();
        }

        function displayPomo() {
            const statusEl = document.getElementById('pomo-status-text');
            const timeEl = document.getElementById('pomo-time-display');
            if (statusEl && timeEl) {
                statusEl.innerText = `${pomoMode} Block`;
                timeEl.innerText = `${String(pomoMinutes).padStart(2,'0')}:${String(pomoSeconds).padStart(2,'0')}`;
            }
        }

        function handleCommand(cmdRaw) {
            if (!cmdRaw) return;
            const cmd = cmdRaw.toLowerCase().trim();
            const args = cmd.split(' ');
            const action = args[0];
            const target = args[1];

            termHistory.push(`<span class="term-prompt">root@focus:~$</span> ${cmdRaw}`);
            let output = "";

            if (cmd === 'david' || cmd === 'edgerunners') {
                setAsciiBackground('david'); output = "Loaded workspace context: Sandevistan Calibration.";
            } else if (cmd === 'lucy') {
                setAsciiBackground('lucy'); output = "Loaded workspace context: Lucy Deep-Dive Log.";
            } else if (cmd === 'moon') {
                setAsciiBackground('moon'); output = "Loaded workspace context: Lunar Core Vector.";
            } else if (cmd === 'house' || cmd === 'diagnose') {
                setAsciiBackground('house'); output = "Loaded medical layout: House M.D. Core Vector Grid.";
            } else if (cmd === 'redjohn' || cmd === 'mentalist') {
                setAsciiBackground('redjohn'); output = "Warning: Bloody smiley context override established.";
            } else if (action === 'kanye' && target === 'graduation') {
                setAsciiBackground('kanyegraduation'); output = "Background Layer: Dropout Bear Vector Blueprint.";
            } else if (action === 'kanye' && target === '808s') {
                setAsciiBackground('kanye808s'); output = "Background Layer: Heart Balloon Matrix Node.";
            } else if (action === 'kanye' && target === 'yeezus') {
                setAsciiBackground('kanyeyeezus'); output = "Background Layer: High-Contrast Tape Array Asset.";
            } else if (cmd === 'resetbg') {
                setAsciiBackground(null); output = "Environment arrays completely localized back to dynamic glass blobs.";
            } else if (action === 'open') {
                if (appRegistry[target]) { openApp(target); output = `Launching context container: ${target}`; }
                else output = `Context framework validation error: ${target}`;
            } else if (cmd === 'help') {
                output = "Commands: open [app], close [app], clear, resetbg\\nArt vectors: david, lucy, moon, house, redjohn, kanye graduation, kanye 808s, kanye yeezus";
            } else if (cmd === 'clear') {
                termHistory = ["Yves.OS Terminal [Version 1.0.0]"]; output = null;
            } else {
                output = `Syntax compilation mismatch tokens near: "${cmdRaw}"`;
            }

            if (output) termHistory.push(output);
            renderTerminal();
        }

        function renderTerminal() {
            const termArea = document.getElementById('term-content');
            if (termArea) {
                termArea.innerHTML = termHistory.map(line => `<div class="term-line">${line}</div>`).join('');
                termArea.scrollTop = termArea.scrollHeight;
            }
        }

        // --- Workspace (Notion Style Document Editor Engine) ---
        window.renderNotion = function() {
            const container = document.getElementById('notion-content');
            if (!container) return;
            
            let sidebarHtml = `<div class="notion-sidebar"><div class="notion-sidebar-header"><span>Workspace</span><span class="notion-add-btn" onclick="addNotionPage()">+</span></div><div class="notion-page-list">`;
            notionData.forEach(page => {
                sidebarHtml += `<div class="notion-page-item ${page.id === activeNotionPageId ? 'active' : ''}" onclick="selectNotionPage(${page.id})"><span>${page.icon}</span><span>${page.title || 'Untitled'}</span></div>`;
            });
            sidebarHtml += `</div></div>`;
            
            const activePage = notionData.find(p => p.id === activeNotionPageId) || notionData[0];
            const mainHtml = `
                <div class="notion-main">
                    <div class="notion-cover"><div class="notion-icon-picker">${activePage.icon}</div></div>
                    <div class="notion-content-wrapper">
                        <input type="text" class="notion-title-input" value="${activePage.title}" placeholder="Untitled" oninput="updateNotionTitle(${activePage.id}, this.value)">
                        <div class="notion-toolbar">
                            <button class="notion-tool-btn" onclick="formatNotion('formatBlock', 'H1')">H1</button>
                            <button class="notion-tool-btn" onclick="formatNotion('formatBlock', 'H2')">H2</button>
                            <button class="notion-tool-btn" onclick="formatNotion('bold')">B</button>
                            <button class="notion-tool-btn" onclick="formatNotion('italic')">I</button>
                            <button class="notion-tool-btn" onclick="formatNotion('insertUnorderedList')">• List</button>
                        </div>
                        <div class="notion-editor" contenteditable="true" oninput="updateNotionContent(${activePage.id}, this.innerHTML)">${activePage.content}</div>
                    </div>
                </div>
            `;
            container.innerHTML = sidebarHtml + mainHtml;
        }

        window.addNotionPage = function() {
            const newId = Date.now();
            notionData.push({ id: newId, title: "Untitled Space", icon: "📄", content: "" });
            activeNotionPageId = newId;
            renderNotion();
        }
        window.selectNotionPage = function(id) { activeNotionPageId = id; renderNotion(); }
        window.updateNotionTitle = function(id, title) {
            const page = notionData.find(p => p.id === id);
            if (page) { page.title = title; renderNotion(); }
        }
        window.updateNotionContent = function(id, content) {
            const page = notionData.find(p => p.id === id);
            if (page) page.content = content;
        }
        window.formatNotion = function(command, value = null) {
            document.execCommand(command, false, value);
        }

        // --- Core Task Management Architecture ---
        window.renderProjects = function() {
            const area = document.getElementById('projects-content');
            if (!area) return;
            let html = `<div class="tracker-header"><h3>Active Projects</h3><p>Track your milestones and tasks.</p></div>
                        <div class="app-input-row"><input type="text" id="new-proj-input" class="app-input" placeholder="New page track..."><button class="app-btn" onclick="addProject()">Add Track</button></div>`;
            projectsData.forEach(p => {
                const total = p.tasks.length, done = p.tasks.filter(t => t.done).length, pct = total === 0 ? 0 : (done/total)*100;
                const ratioText = done + "/" + total;
                html += `
                <div class="proj-card">
                    <div class="proj-title"><span>${p.name}</span><span style="font-size:13px;color:var(--os-accent);">${ratioText}</span></div>
                    <div class="proj-progress"><div class="proj-progress-bar" style="width: ${pct}%"></div></div>
                    <div class="task-list">
                `;
                p.tasks.forEach((t, i) => {
                    html += `
                    <div class="task-item ${t.done ? 'done' : ''}" onclick="toggleTask(${p.id}, ${i})" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                        <div style="display: flex; align-items: center; gap: 12px;">
                            <div class="checkbox"></div>
                            <span>${t.t}</span>
                        </div>
                        <span class="delete-task-btn" onclick="deleteTask(${p.id}, ${i}, event)" style="color: var(--text-secondary); cursor: pointer; font-size: 14px; padding: 0 4px; transition: color 0.2s;" onmouseover="this.style.color='var(--mac-red)'" onmouseout="this.style.color='var(--text-secondary)'">✕</span>
                    </div>`;
                });
                html += `
                        <div class="app-input-row" style="margin-top:12px;margin-bottom:0;">
                            <input type="text" id="new-task-${p.id}" class="app-input" style="padding:4px 8px;font-size:13px;" placeholder="Next step metrics...">
                            <button class="app-btn" style="padding:4px 12px;font-size:13px;" onclick="addTask(${p.id}, event)">Add</button>
                        </div>
                    </div></div>`;
            });
            area.innerHTML = html;
        }

        window.addProject = function() {
            const inp = document.getElementById('new-proj-input');
            if(inp && inp.value.trim()) { projectsData.push({ id: Date.now(), name: inp.value.trim(), tasks: [] }); renderProjects(); }
        }
        window.addTask = function(pid, e) {
            e.stopPropagation();
            const inp = document.getElementById(`new-task-${pid}`);
            if(inp && inp.value.trim()) {
                const proj = projectsData.find(p => p.id === pid);
                if(proj) { proj.tasks.push({ t: inp.value.trim(), done: false }); renderProjects(); }
            }
        }
        window.toggleTask = function(pid, tIndex) {
            const proj = projectsData.find(p => p.id === pid);
            if(proj && proj.tasks[tIndex]) { proj.tasks[tIndex].done = !proj.tasks[tIndex].done; renderProjects(); }
        }
        window.deleteTask = function(pid, tIndex, event) {
            event.stopPropagation();
            const proj = projectsData.find(p => p.id === pid);
            if (proj && proj.tasks[tIndex]) {
                proj.tasks.splice(tIndex, 1);
                renderProjects();
            }
        }

        window.updateAuraCount = function(count) {
            activeBlobs = parseInt(count);
            drawBlobs();
            document.getElementById('aura-count-val').innerText = count;
        }

        // --- Arcade Engine Core (Flappy Glass) ---
        window.startFlappyGame = function() {
            const container = document.getElementById('flappy-container');
            if (!container) return;
            const bird = document.getElementById('flappy-bird'), pipesContainer = document.getElementById('flappy-pipes');
            const scoreEl = document.getElementById('flappy-score'), msgEl = document.getElementById('flappy-msg');
            let isPlaying = false, isGameOver = false, birdY = container.offsetHeight / 2 || 150;
            let velocity = 0, gravity = 0.4, jumpForce = -6, pipes = [], score = 0, frameCount = 0;

            if(window.flappyLoopId) cancelAnimationFrame(window.flappyLoopId);

            const resetGame = () => {
                birdY = container.offsetHeight / 2 || 150; velocity = 0; pipes = []; score = 0;
                pipesContainer.innerHTML = ''; scoreEl.innerText = score;
                bird.style.top = birdY + 'px'; msgEl.style.display = 'none';
                isPlaying = true; isGameOver = false; frameCount = 0; gameLoop();
            };

            const jump = () => { if (isGameOver || !isPlaying) resetGame(); else velocity = jumpForce; };
            container.onclick = jump;
            container.onkeydown = (e) => { if (e.code === 'Space') { e.preventDefault(); jump(); } };
            container.focus();

            const gameOver = () => { isPlaying = false; isGameOver = true; cancelAnimationFrame(window.flappyLoopId); msgEl.style.display = 'block'; };

            const createPipe = () => {
                const gap = 140, minHeight = 40, maxPos = container.offsetHeight - minHeight - gap;
                const topHeight = Math.floor(Math.random() * (maxPos - minHeight + 1) + minHeight);
                const pipeTop = document.createElement('div');
                pipeTop.className = 'flappy-pipe'; pipeTop.style.height = topHeight + 'px'; pipeTop.style.top = '0'; pipeTop.style.left = container.offsetWidth + 'px';
                const pipeBottom = document.createElement('div');
                pipeBottom.className = 'flappy-pipe'; pipeBottom.style.height = (container.offsetHeight - topHeight - gap) + 'px'; pipeBottom.style.bottom = '0'; pipeBottom.style.left = container.offsetWidth + 'px';
                pipesContainer.appendChild(pipeTop); pipesContainer.appendChild(pipeBottom);
                pipes.push({ x: container.offsetWidth, top: pipeTop, bottom: pipeBottom, passed: false });
            };

            const gameLoop = () => {
                if (!isPlaying) return;
                velocity += gravity; birdY += velocity; bird.style.top = birdY + 'px';
                if (birdY < 0 || birdY > container.offsetHeight - 24) { gameOver(); return; }
                if (frameCount % 120 === 0) createPipe();
                for (let i = 0; i < pipes.length; i++) {
                    let p = pipes[i]; p.x -= 2.5; p.top.style.left = p.x + 'px'; p.bottom.style.left = p.x + 'px';
                    const birdRect = { top: birdY, bottom: birdY + 24, left: 60, right: 84 };
                    const topRect = { top: 0, bottom: parseFloat(p.top.style.height), left: p.x, right: p.x + 60 };
                    const botRect = { top: container.offsetHeight - parseFloat(p.bottom.style.height), bottom: container.offsetHeight, left: p.x, right: p.x + 60 };
                    if ((birdRect.right > topRect.left && birdRect.left < topRect.right && birdRect.top < topRect.bottom) ||
                        (birdRect.right > botRect.left && birdRect.left < botRect.right && birdRect.bottom > botRect.top)) { gameOver(); return; }
                    if (p.x + 60 < 60 && !p.passed) { p.passed = true; score++; scoreEl.innerText = score; }
                }
                if (pipes.length > 0 && pipes[0].x < -60) { pipes[0].top.remove(); pipes[0].bottom.remove(); pipes.shift(); }
                frameCount++; window.flappyLoopId = requestAnimationFrame(gameLoop);
            };
        }

        // --- Global System UI Drag/Drop & Maximization Management Engines ---
        function makeDraggable(winEl, handleEl) {
            let startX = 0, startY = 0, currentX = 0, currentY = 0;
            handleEl.onpointerdown = (e) => {
                if (winEl.classList.contains('maximized')) return; // Block dragging when full-screen
                e.preventDefault(); focusWindow(winEl.id.replace('win-', ''));
                startX = e.clientX; startY = e.clientY;
                document.onpointermove = (ev) => {
                    ev.preventDefault(); currentX = startX - ev.clientX; currentY = startY - ev.clientY;
                    startX = ev.clientX; startY = ev.clientY;
                    let newTop = winEl.offsetTop - currentY, newLeft = winEl.offsetLeft - currentX;
                    if (newTop < 36) newTop = 36;
                    winEl.style.top = newTop + "px"; winEl.style.left = newLeft + "px";
                };
                document.onpointerup = () => { document.onpointermove = null; document.onpointerup = null; };
            };
        }

        window.toggleMaximize = function(appId) {
            const win = document.getElementById(`win-${appId}`);
            if (!win) return;

            if (win.classList.contains('maximized')) {
                // Restore window configuration boundaries from stored node properties
                win.classList.remove('maximized');
                win.style.top = win.dataset.oldTop || '100px';
                win.style.left = win.dataset.oldLeft || '100px';
                win.style.width = win.dataset.oldWidth || '500px';
                win.style.height = win.dataset.oldHeight || '400px';
            } else {
                // Save boundary snapshots into custom DOM parameters before expanding layout variables
                win.dataset.oldTop = win.style.top;
                win.dataset.oldLeft = win.style.left;
                win.dataset.oldWidth = win.style.width;
                win.dataset.oldHeight = win.style.height;

                win.classList.add('maximized');
                win.style.top = '36px';
                win.style.left = '0px';
                win.style.width = '100vw';
                win.style.height = 'calc(100vh - 36px)';
            }
        }

        function focusWindow(appId) {
            const win = document.getElementById(`win-${appId}`);
            if (win) { zIndex++; win.style.zIndex = zIndex; document.getElementById('active-app-name').textContent = appRegistry[appId].name; }
        }

        window.closeWindow = function(appId) {
            const win = document.getElementById(`win-${appId}`);
            if (win) {
                win.style.opacity = '0'; win.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    if(appId === 'flappy' && window.flappyLoopId) cancelAnimationFrame(window.flappyLoopId);
                    if(appId === 'focus') pausePomo();
                    win.remove(); delete openWindows[appId];
                    const dockItem = document.getElementById(`dock-${appId}`);
                    if(dockItem) dockItem.classList.remove('active');
                    
                    const remaining = Object.keys(openWindows);
                    if(remaining.length > 0) focusWindow(remaining[remaining.length - 1]);
                    else document.getElementById('active-app-name').textContent = 'Desktop';
                }, 200);
            }
        }

                content: `<div class="notion-app" id="notion-content"></div>`
            },
            'projects': {
                name: 'Tasks',
                icon: `<svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>`,
                width: 420, height: 500,
                content: `<div class="tracker-app" id="projects-content"></div>`
            },
            'focus': {
                name: 'Focus Timer',
                icon: `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>`,
                width: 350, height: 350,
                content: `
                    <div class="focus-app">
                        <div class="timer-display" id="pomo-display">25:00</div>
                        <div class="timer-controls">
                            <button class="pomo-btn" id="btn-pomo-start" onclick="startPomo()">START</button>
                            <button class="pomo-btn" id="btn-pomo-pause" onclick="pausePomo()">PAUSE</button>

            },
            'terminal': {
                name: 'Terminal',
                icon: `<svg viewBox="0 0 24 24"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>`,
                width: 500, height: 420,
                content: `
                    <div class="terminal-app">
                        <div id="term-content"></div>
                        <div style="display:flex;">
                            <span class="term-prompt">root@focus:~$</span>
                            <input type="text" class="cli-input" id="term-inner-input" autocomplete="off" onkeydown="if(event.key==='Enter'){handleCommand(this.value); this.value='';}">

            },
            'flappy': {
                name: 'Break Time',
                icon: `<svg viewBox="0 0 24 24"><polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2"></polygon><line x1="12" y1="22" x2="12" y2="15.5"></line><polyline points="22 8.5 12 15.5 2 8.5"></polyline><polyline points="2 15.5 12 8.5 22 15.5"></polyline><line x1="12" y1="2" x2="12" y2="8.5"></line></svg>`,
                width: 400, height: 500,
                content: `
                    <div class="flappy-app" id="flappy-container" tabindex="0">
                        <div class="flappy-score" id="flappy-score">0</div>
                        <div class="flappy-bird" id="flappy-bird"></div>
                        <div id="flappy-pipes"></div>
                        <div class="flappy-msg" id="flappy-msg">Click or press SPACE to start</div>
                    </div>
                `
            },
            'settings': {
                name: 'Zen Customize',
                icon: `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"></path></svg>`,
                width: 380, height: 520,
                content: `
                    <div class="settings-app">
                        <div class="settings-section">
                            <h2>Glass Engine</h2>
                            <div class="settings-row">
                                <label>Frosted Blur</label>
                                <div style="display: flex; align-items: center; gap: 8px;">
                                    <input type="range" min="0" max="100" value="35" class="settings-slider" oninput="updateCSS('--glass-blur', this.value + 'px')">
                                </div>
                            </div>
                            <div class="settings-row">
                                <label>Saturation</label>
                                <div style="display: flex; align-items: center; gap: 8px;">
                                    <input type="range" min="100" max="300" value="180" class="settings-slider" oninput="updateCSS('--glass-saturate', this.value + '%')">
                                </div>
                            </div>
                        </div>
                        <div class="settings-section">
                            <h2>Aura Settings & Accent</h2>
                            <div class="settings-row">
                                <label>Aura Spheres (<span id="aura-count-val">3</span>)</label>
                                <div style="display: flex; align-items: center; gap: 8px;">
                                    <input type="range" min="1" max="5" value="3" class="settings-slider" oninput="updateAuraCount(this.value)">
                                </div>

                            <div class="settings-row">
                                <label>Clock Position</label>
                                <select class="app-input" style="width: 120px; padding: 4px;" onchange="window.changeClockPos(this.value)">
                                    <option value="pos-top-left">Top Left</option>
                                    <option value="pos-center">Center</option>
                                    <option value="pos-top-right">Top Right</option>
                                </select>
                            </div>
                            <div class="settings-row"><label>Background Base</label><input type="color" value="#0a0a0c" class="settings-color" oninput="updateCSS('--bg-base', this.value)"></div>
                            <div class="settings-row"><label>ASCII Art Accent (David)</label><input type="color" value="#f1c40f" class="settings-color" oninput="updateCSS('--ascii-color', this.value)"></div>
                            <div class="settings-row"><label>Aura Sphere 1 / OS Accent</label><input type="color" value="#ff3b30" class="settings-color" oninput="updateCSS('--blob-1-color', this.value)"></div>
                            <div class="settings-row"><label>Aura Sphere 2</label><input type="color" value="#5e5ce6" class="settings-color" oninput="updateCSS('--blob-2-color', this.value)"></div>
                            <div class="settings-row"><label>Aura Sphere 3</label><input type="color" value="#007aff" class="settings-color" oninput="updateCSS('--blob-3-color', this.value)"></div>
                        </div>
                    </div>
                `
            }
        };

        window.openApp = function(appId) {
            if (openWindows[appId]) {
                focusWindow(appId);
                return;
            }

            const app = appRegistry[appId];
            const winId = `win-${appId}`;
            
            const winEl = document.createElement('div');
            winEl.id = winId;
            winEl.className = 'window glass-panel';
            winEl.style.width = app.width + 'px';
            winEl.style.height = app.height + 'px';
            
            winEl.style.opacity = '0';
            winEl.style.transform = 'scale(0.95)';
            
            const offset = Object.keys(openWindows).length * 30;
            const startTop = Math.max(44, (window.innerHeight - app.height) / 2 + offset);
            const startLeft = Math.max(0, (window.innerWidth - app.width) / 2 + offset);
            
            winEl.style.top = startTop + 'px';
            winEl.style.left = startLeft + 'px';

            winEl.innerHTML = `
                <div class="window-header" id="header-${winId}">
                    <div class="mac-controls">
                        <button class="mac-btn mac-close" onclick="closeWindow('${appId}')"></button>
                        <button class="mac-btn mac-min" onclick="closeWindow('${appId}')"></button>
                        <button class="mac-btn mac-max" onclick="window.toggleMaximize('${appId}')"></button>
                    </div>
                    <div class="window-title">
                        ${app.icon}
                        ${app.name}
                    </div>
                </div>
                <div class="window-content">
                    ${app.content}
                </div>
            `;

            document.getElementById('window-layer').appendChild(winEl);
            makeDraggable(winEl, document.getElementById(`header-${winId}`));
            
            requestAnimationFrame(() => {
                winEl.style.opacity = '1';
                winEl.style.transform = 'scale(1)';
            });
            
            openWindows[appId] = true;
            document.getElementById(`dock-${appId}`).classList.add('active');
            focusWindow(appId);

            // App specific initializations
            if (appId === 'workspace') renderNotion();
            if (appId === 'projects') renderProjects();
            if (appId === 'terminal') renderTerminal();
            if (appId === 'focus') updatePomoDisplay();
            if (appId === 'flappy') startFlappyGame();
        }

        window.updateCSS = (varName, value) => {
            document.documentElement.style.setProperty(varName, value);
            if (varName.includes('--blob-')) {
                drawBlobs();
            }
            if (varName === '--blob-1-color' && document.getElementById('bg-ascii-container').style.display !== 'flex') {
                setOSAccent(value);
            }
        };

        function updateClock() {
            const now = new Date();
            const days = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
            const fullDays = ['SUNDAY', 'MONDAY', 'TUESDAY', 'WEDNESDAY', 'THURSDAY', 'FRIDAY', 'SATURDAY'];
            const months = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];
            let h = now.getHours();
            const m = String(now.getMinutes()).padStart(2, '0');
            const ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12;
            
            document.getElementById('sys-clock-small').textContent = `${days[now.getDay()]} ${now.getDate()} ${months[now.getMonth()]} ${h}:${m} ${ampm}`;
            document.getElementById('bg-clock').innerHTML = `${String(h).padStart(2,'0')}<span style="opacity: ${now.getSeconds() % 2 === 0 ? 1 : 0.2}">:</span>${m}`;
            document.getElementById('bg-date').textContent = `${fullDays[now.getDay()]}, ${months[now.getMonth()]} ${String(now.getDate()).padStart(2,'0')}`;
            
            // Greeter for Dashboard if open
            const dashHeader = document.querySelector('.dash-header h1');
            if(dashHeader) {
                let currentH = now.getHours();
                if(currentH < 12) dashHeader.textContent = "Good Morning!";
                else if(currentH < 18) dashHeader.textContent = "Good Afternoon!";
                else dashHeader.textContent = "Good Evening!";
            }
        }

        window.onload = () => {
            // Set initial OS accent to blob-1 color
            setOSAccent(getComputedStyle(document.documentElement).getPropertyValue('--blob-1-color').trim());
            updateClock();
            setInterval(updateClock, 1000);
            drawBlobs();
            openApp('dashboard'); 
            const cli = document.getElementById('cli-main-input');
            if(cli) cli.focus();
        };
    </script>
